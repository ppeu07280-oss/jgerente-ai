<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JgerenteAI — Funcionário</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;900&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#050508;--white:#F5F3EE;--accent:#00FF88;
  --muted:#8B8B99;--card:#0D0D14;--card2:#111118;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.1);
  --font:'Unbounded',sans-serif;--body:'DM Sans',sans-serif;
  --error:#FF3D6B;--r:12px;
}
html,body{min-height:100vh}
body{font-family:var(--body);background:var(--black);color:var(--white)}

/* LOGIN */
#login-screen{position:fixed;inset:0;z-index:999;background:var(--black);display:flex;align-items:center;justify-content:center;padding:1.5rem}
.login-box{width:100%;max-width:380px;background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:2rem}
.login-logo{font-family:var(--font);font-weight:900;font-size:1rem;letter-spacing:-.02em;margin-bottom:1.5rem;text-align:center}
.login-logo .j{color:var(--accent)}
.login-badge{display:inline-flex;align-items:center;gap:.375rem;background:rgba(0,255,136,.08);border:1px solid rgba(0,255,136,.15);color:var(--accent);padding:.3rem .875rem;border-radius:100px;font-size:.7rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-bottom:1.25rem}
.login-title{font-family:var(--font);font-size:1.2rem;font-weight:900;letter-spacing:-.03em;margin-bottom:.375rem}
.login-sub{font-size:.8rem;color:var(--muted);margin-bottom:1.5rem}
.lbl{display:block;font-size:.68rem;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:.375rem}
.inp{width:100%;padding:.8rem 1rem;background:var(--card2);border:1.5px solid var(--border2);border-radius:var(--r);font-size:.9rem;color:var(--white);font-family:var(--body);outline:none;transition:border-color .2s}
.inp::placeholder{color:var(--muted)}
.inp:focus{border-color:var(--accent)}
.fg{margin-bottom:1rem}
.btn-login{width:100%;padding:.875rem;background:var(--accent);color:var(--black);border:none;border-radius:var(--r);font-family:var(--font);font-size:.82rem;font-weight:700;cursor:pointer;margin-top:.25rem;transition:all .2s}
.btn-login:disabled{opacity:.5;cursor:not-allowed}
.login-err{font-size:.75rem;color:var(--error);margin-top:.625rem;text-align:center;min-height:18px}

/* APP */
#app{display:none;min-height:100vh;flex-direction:column}
#app.show{display:flex}

/* HEADER */
.app-header{
  background:var(--card);border-bottom:1px solid var(--border);
  padding:1rem 1.25rem;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.header-logo{font-family:var(--font);font-size:.85rem;font-weight:900}
.header-logo .j{color:var(--accent)}
.header-user{display:flex;align-items:center;gap:.625rem}
.header-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:800;color:var(--black);flex-shrink:0}
.header-name{font-size:.8rem;font-weight:600}
.header-company{font-size:.7rem;color:var(--muted)}
.btn-sair{background:none;border:1px solid var(--border2);color:var(--muted);font-family:var(--body);font-size:.72rem;padding:.4rem .75rem;border-radius:8px;cursor:pointer}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--card)}
.tab-btn{flex:1;padding:.875rem;font-size:.75rem;font-weight:600;color:var(--muted);background:none;border:none;cursor:pointer;font-family:var(--body);border-bottom:2px solid transparent;transition:all .15s}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

/* CONTENT */
.content{padding:1.25rem;flex:1}

/* TAREFA CARD */
.tarefa-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:1.125rem;margin-bottom:.75rem;
  transition:border-color .15s;
}
.tarefa-card:hover{border-color:var(--border2)}
.tarefa-card.urgente{border-left:3px solid var(--error)}
.tarefa-card.alta{border-left:3px solid #FFD600}
.tarefa-card.concluida{opacity:.55}
.tarefa-card.expirada{border-left:3px solid var(--muted)}
.tarefa-titulo{font-size:.88rem;font-weight:600;margin-bottom:.375rem}
.tarefa-titulo.riscado{text-decoration:line-through;color:var(--muted)}
.tarefa-meta{font-size:.72rem;color:var(--muted);display:flex;align-items:center;gap:.625rem;flex-wrap:wrap;margin-bottom:.875rem}
.prio-badge{padding:.15rem .5rem;border-radius:100px;font-size:.6rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.prio-badge.urgente{background:rgba(255,61,107,.15);color:var(--error)}
.prio-badge.alta{background:rgba(255,214,0,.1);color:#FFD600}
.prio-badge.normal{background:rgba(0,255,136,.08);color:var(--accent)}
.prio-badge.expirada{background:rgba(255,255,255,.05);color:var(--muted)}
.tarefa-actions{display:flex;gap:.5rem}
.btn-action{flex:1;padding:.625rem;border-radius:8px;font-size:.75rem;font-weight:600;cursor:pointer;border:none;font-family:var(--body);transition:all .15s}
.btn-concluir{background:var(--accent);color:var(--black)}
.btn-concluir:hover{opacity:.9}
.btn-andamento{background:rgba(255,214,0,.1);border:1px solid rgba(255,214,0,.2);color:#FFD600}
.prova-preview{margin-top:.75rem;padding:.75rem;background:var(--card2);border-radius:10px;border:1px solid var(--border)}
.prova-img{width:100%;max-height:140px;object-fit:cover;border-radius:8px;margin-bottom:.5rem}
.prova-comment{font-size:.78rem;color:var(--muted);line-height:1.5}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(8px)}
.overlay.show{display:flex}
.modal{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:500px;padding:1.5rem;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:none;opacity:1}}
.modal-handle{width:36px;height:3px;background:var(--border2);border-radius:100px;margin:-.5rem auto 1.25rem}
.modal-title{font-family:var(--font);font-size:1.1rem;font-weight:900;letter-spacing:-.03em;margin-bottom:1.25rem}
.foto-upload{
  width:100%;height:140px;border:2px dashed var(--border2);border-radius:12px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;margin-bottom:1rem;position:relative;overflow:hidden;
}
.foto-upload:hover{border-color:var(--accent);background:rgba(0,255,136,.04)}
.foto-upload input{position:absolute;inset:0;opacity:0;cursor:pointer}
.foto-preview{width:100%;height:100%;object-fit:cover;display:none}
.foto-icon{font-size:2rem;margin-bottom:.5rem}
.foto-text{font-size:.75rem;color:var(--muted)}
.btn-modal{width:100%;padding:.875rem;border-radius:var(--r);font-family:var(--font);font-size:.8rem;font-weight:700;cursor:pointer;border:none;margin-top:.5rem;transition:all .2s}
.btn-modal.primary{background:var(--accent);color:var(--black)}
.btn-modal.outline{background:none;border:1px solid var(--border2);color:var(--white)}

/* PERFORMANCE */
.perf-header{display:flex;align-items:center;gap:.75rem;margin-bottom:1.5rem}
.perf-av{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;font-weight:800;color:var(--black);flex-shrink:0}
.perf-name{font-family:var(--font);font-size:1rem;font-weight:900;letter-spacing:-.02em}
.perf-role{font-size:.75rem;color:var(--muted)}
.perf-score{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:1.25rem;margin-bottom:1rem;text-align:center;
}
.score-num{font-family:var(--font);font-size:2.5rem;font-weight:900;line-height:1;letter-spacing:-.04em}
.score-label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:.25rem}
.score-bar{height:8px;background:var(--border);border-radius:100px;overflow:hidden;margin-top:.875rem}
.score-fill{height:100%;border-radius:100px;transition:width .8s ease}
.chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.125rem;margin-bottom:1rem}
.chart-title{font-size:.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:1rem}
.chart-bars{display:flex;align-items:flex-end;gap:.375rem;height:80px}
.chart-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:.375rem}
.chart-bar-wrap{flex:1;width:100%;display:flex;flex-direction:column;justify-content:flex-end;gap:2px}
.bar-concluida{border-radius:3px 3px 0 0;background:var(--accent);min-height:2px;transition:height .5s}
.bar-expirada{border-radius:3px 3px 0 0;background:var(--error);min-height:2px;transition:height .5s}
.chart-day{font-size:.6rem;color:var(--muted);text-align:center}
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1rem}
.stat-mini{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem;text-align:center}
.stat-mini-val{font-family:var(--font);font-size:1.5rem;font-weight:900;letter-spacing:-.03em;line-height:1}
.stat-mini-label{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:.25rem}

/* PRESENÇA */
.btn-presenca{
  width:100%;padding:1.5rem;border-radius:20px;
  font-family:var(--font);font-size:1rem;font-weight:900;
  letter-spacing:-.02em;cursor:pointer;border:none;
  transition:all .2s;display:flex;align-items:center;
  justify-content:center;gap:.75rem;margin-bottom:1rem;
}
.btn-entrada{background:var(--accent);color:var(--black)}
.btn-entrada:hover{box-shadow:0 8px 30px rgba(0,255,136,.3)}
.btn-saida{background:rgba(255,61,107,.15);border:2px solid rgba(255,61,107,.3);color:var(--error)}
.btn-saida:hover{background:rgba(255,61,107,.2)}
.status-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;padding:1.5rem;text-align:center;margin-bottom:1rem;
}
.status-icon{font-size:3rem;margin-bottom:.75rem}
.status-title{font-family:var(--font);font-size:1.1rem;font-weight:900;letter-spacing:-.03em;margin-bottom:.25rem}
.status-sub{font-size:.8rem;color:var(--muted)}
.presenca-row{
  display:flex;align-items:center;gap:.875rem;
  padding:.75rem 0;border-bottom:1px solid var(--border);
}
.presenca-row:last-child{border-bottom:none}
.presenca-tipo{
  width:32px;height:32px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:.85rem;flex-shrink:0;
}

/* EMPTY */
.empty{text-align:center;padding:3rem 1rem;color:var(--muted)}
.empty-icon{font-size:2.5rem;margin-bottom:.75rem}
.empty-text{font-size:.85rem;line-height:1.6}

/* TOAST */
.toast{position:fixed;top:1rem;left:50%;transform:translateX(-50%);z-index:9999;background:var(--card2);border:1px solid var(--border2);padding:.75rem 1.25rem;border-radius:100px;font-size:.8rem;font-weight:600;display:none;white-space:nowrap}
.toast.show{display:block;animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo"><span class="j">J</span>gerenteAI</div>
    <div style="text-align:center;margin-bottom:1.25rem">
      <div class="login-badge">👷 Área do Funcionário</div>
    </div>
    <div class="login-title">Entrar no painel</div>
    <div class="login-sub">Acesse com seu email e senha cadastrados</div>
    <div class="fg"><label class="lbl">Email</label><input class="inp" id="l-email" type="email" placeholder="seu@email.com" onkeydown="if(event.key==='Enter')document.getElementById('l-pwd').focus()"></div>
    <div class="fg"><label class="lbl">Senha</label><input class="inp" id="l-pwd" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn-login" id="l-btn" onclick="doLogin()">Entrar →</button>
    <div class="login-err" id="l-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="app-header">
    <div class="header-logo"><span class="j">J</span>gerenteAI</div>
    <div class="header-user">
      <div>
        <div class="header-name" id="h-name">...</div>
        <div class="header-company" id="h-company">...</div>
      </div>
      <div class="header-av" id="h-av">JG</div>
      <button class="btn-sair" onclick="doLogout()">Sair</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('tarefas')">📋 Tarefas</button>
    <button class="tab-btn" onclick="showTab('presenca')">🕐 Presença</button>
    <button class="tab-btn" onclick="showTab('performance')">📊 Performance</button>
  </div>

  <div class="content" id="content">
    <div style="text-align:center;padding:3rem;color:var(--muted)">Carregando...</div>
  </div>
</div>

<!-- MODAL PROVA -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="modal-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const { createClient } = supabase;
const sb = createClient(
  'https://hnculphposmgfvaeliiw.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhuY3VscGhwb3NtZ2Z2YWVsaWl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MTE4MDIsImV4cCI6MjA5MDM4NzgwMn0.mlkDEf0HI6XQm2mX7Ee3CWcR8WxevJiy3l2xBdvTaNM'
);

let S = { usuario: null, company: null, tarefas: [], presencas: [], currentTab: 'tarefas', presencaHoje: null };
const AV_COLORS = ['#00FF88','#3D6BFF','#FF3D6B','#FFD600','#A855F7'];
function avColor(str){ let h=0; for(let i=0;i<(str||'').length;i++) h=(h*31+str.charCodeAt(i))&0xffff; return AV_COLORS[h%AV_COLORS.length]; }
function initials(n){ const p=n?.trim().split(' ')||[]; return p.length>=2?(p[0][0]+p[1][0]).toUpperCase():n?.slice(0,2).toUpperCase()||'JG'; }
function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(iso){ if(!iso) return ''; return new Date(iso).toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}); }
let toastTimer;
function toast(msg, green=true){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.style.color=green?'var(--accent)':'var(--error)';
  el.style.borderColor=green?'rgba(0,255,136,.2)':'rgba(255,61,107,.2)';
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),3000);
}
function openModal(html){ document.getElementById('modal-body').innerHTML=html; document.getElementById('overlay').classList.add('show'); }
function closeModal(){ document.getElementById('overlay').classList.remove('show'); }

// ── LOGIN ──
async function doLogin(){
  const email=document.getElementById('l-email').value.trim();
  const pwd=document.getElementById('l-pwd').value;
  const btn=document.getElementById('l-btn');
  const err=document.getElementById('l-err');
  if(!email||!pwd){ err.textContent='⚠️ Preencha email e senha'; return; }
  btn.disabled=true; btn.textContent='Entrando...';
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pwd });
  if(error){ err.textContent='❌ Email ou senha incorretos'; btn.disabled=false; btn.textContent='Entrar →'; return; }
  await initApp(data.user);
}

async function doLogout(){
  await sb.auth.signOut();
  location.reload();
}

async function initApp(user){
  try{
    const { data: usr } = await sb.from('usuarios').select('*').eq('auth_id', user.id).single();
    if(!usr){ document.getElementById('l-err').textContent='⚠️ Usuário não encontrado'; return; }
    S.usuario = usr;

    const { data: comp } = await sb.from('companies').select('*').eq('id', usr.company_id).single();
    S.company = comp;

    // Update header
    document.getElementById('h-name').textContent = usr.nome;
    document.getElementById('h-company').textContent = comp?.nome || '';
    const av = document.getElementById('h-av');
    av.textContent = initials(usr.nome);
    av.style.background = avColor(usr.nome);

    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').classList.add('show');

    await loadTarefas();
    await loadPresencas();
    renderTab('tarefas');

  }catch(e){
    console.error(e);
    document.getElementById('l-btn').disabled=false;
    document.getElementById('l-btn').textContent='Entrar →';
    document.getElementById('l-err').textContent='⚠️ Erro ao carregar. Tente novamente.';
  }
}

async function loadTarefas(){
  const agora = new Date();
  const hojeStr = agora.toISOString().split('T')[0];

  // Buscar apenas tarefas de hoje (criadas hoje ou com prazo hoje)
  const { data } = await sb.from('tarefas')
    .select('*')
    .eq('company_id', S.company.id)
    .eq('atribuido_para', S.usuario.id)
    .eq('recorrente', false)
    .gte('created_at', hojeStr + 'T00:00:00')
    .order('prazo', {ascending: true});

  // Verificar expiradas por horário
  for(const t of (data||[])){
    if(t.status === 'pendente' || t.status === 'em_andamento'){
      if(t.prazo && new Date(t.prazo) < agora){
        await sb.from('tarefas').update({status:'expirada'}).eq('id',t.id);
        t.status = 'expirada';
      }
    }
  }
  S.tarefas = data || [];
}

// ── TABS ──
function showTab(tab){
  S.currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['tarefas','presenca','performance'][i]===tab));
  renderTab(tab);
}

function renderTab(tab){
  if(tab==='tarefas') renderTarefas();
  else if(tab==='presenca') renderPresenca();
  else renderPerformance();
}

// ── TAREFAS ──
function renderTarefas(){
  const agora = new Date();
  const el = document.getElementById('content');

  // Separar normais e grupos recorrentes
  const normais = S.tarefas.filter(t=>!t.recorrente && !t.tarefa_pai);
  const filhas = S.tarefas.filter(t=>t.tarefa_pai);

  // Agrupar filhas por tarefa_pai
  const grupos = {};
  filhas.forEach(t=>{
    if(!grupos[t.tarefa_pai]) grupos[t.tarefa_pai]=[];
    grupos[t.tarefa_pai].push(t);
  });

  // Verificar expiração por horário
  filhas.forEach(async t=>{
    if((t.status==='pendente'||t.status==='em_andamento') && t.prazo && new Date(t.prazo) < agora){
      await sb.from('tarefas').update({status:'expirada'}).eq('id',t.id);
      t.status='expirada';
    }
  });

  const temTarefas = normais.length>0 || Object.keys(grupos).length>0;

  el.innerHTML = `
    ${!temTarefas?`<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">Nenhuma tarefa para hoje.<br>Bom descanso! 😄</div></div>`:''}

    ${normais.map(t=>tarefaCard(t)).join('')}

    ${Object.keys(grupos).map(paiId=>{
      const reps = grupos[paiId].sort((a,b)=>a.repeticao_atual-b.repeticao_atual);
      return grupoCard(reps);
    }).join('')}
  `;

  // Auto-refresh a cada minuto para desbloquear próximas repetições
  clearTimeout(window._refreshTimer);
  window._refreshTimer = setTimeout(()=>renderTarefas(), 60000);
}

function grupoCard(reps){
  const agora = new Date();
  const total = reps[0]?.repeticoes_dia || reps.length;
  const titulo = reps[0]?.titulo || '';

  return`<div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.125rem;margin-bottom:.75rem">
    <!-- Header da tarefa -->
    <div style="margin-bottom:1rem">
      <div style="font-size:.88rem;font-weight:700;margin-bottom:.25rem">${escHtml(titulo)}</div>
      <div style="font-size:.72rem;color:var(--muted)">🔁 ${total} repetições hoje</div>
    </div>

    <!-- Lista de todas as repetições -->
    <div style="display:flex;flex-direction:column;gap:.5rem">
      ${reps.map(r=>{
        const prazo = r.prazo ? new Date(r.prazo) : null;
        const abertura = prazo ? new Date(prazo.getTime() - 5*60*1000) : null;
        const fechamento = prazo ? new Date(prazo.getTime() + 10*60*1000) : null;
        const isAtiva = abertura && fechamento && agora >= abertura && agora <= fechamento && r.status !== 'concluida' && r.status !== 'expirada';
        const isBloqueada = abertura && agora < abertura && r.status === 'pendente';
        const isConcluida = r.status === 'concluida';
        const isExpirada = r.status === 'expirada';

        const corBorda = isConcluida ? 'rgba(0,255,136,.2)' : isExpirada ? 'rgba(255,61,107,.2)' : isAtiva ? 'rgba(255,214,0,.3)' : 'var(--border)';
        const bgCard = isConcluida ? 'rgba(0,255,136,.04)' : isExpirada ? 'rgba(255,61,107,.04)' : isAtiva ? 'rgba(255,214,0,.04)' : 'var(--card2)';
        const icone = isConcluida ? '✅' : isExpirada ? '⏰' : isAtiva ? '▶' : '🔒';
        const horarioLabel = prazo ? prazo.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}) : '';

        return`<div style="background:${bgCard};border:1.5px solid ${corBorda};border-radius:10px;padding:.75rem">
          <div style="display:flex;align-items:center;gap:.625rem;margin-bottom:${isAtiva?'.625rem':'0'}">
            <div style="font-size:1rem;flex-shrink:0">${icone}</div>
            <div style="flex:1">
              <div style="font-size:.8rem;font-weight:600;color:${isConcluida?'var(--accent)':isExpirada?'var(--error)':isAtiva?'#FFD600':'var(--muted)'}">
                ${r.repeticao_atual}ª repetição
                ${isBloqueada ? '· 🔒 Bloqueada' : ''}
                ${isConcluida ? '· Concluída' : ''}
                ${isExpirada ? '· Expirada' : ''}
                ${isAtiva ? '· Disponível agora!' : ''}
              </div>
              <div style="font-size:.7rem;color:var(--muted)">
                ${horarioLabel ? `Horário: ${horarioLabel}` : ''}
                ${isBloqueada && abertura ? ` · Libera às ${abertura.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}` : ''}
                ${isAtiva && fechamento ? ` · Expira às ${fechamento.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}` : ''}
              </div>
            </div>
          </div>
          ${isAtiva ? `
          <div style="display:flex;gap:.5rem">
            ${r.status!=='em_andamento'
              ? `<button class="btn-action btn-andamento" onclick="marcarAndamento('${r.id}')" style="flex:1;font-size:.72rem">▶ Em andamento</button>`
              : `<span style="font-size:.72rem;color:#FFD600;font-weight:600;padding:.4rem">▶ Em andamento</span>`}
            <button class="btn-action btn-concluir" onclick="showConcluir('${r.id}')" style="flex:1;font-size:.72rem">✅ Concluir</button>
          </div>` : ''}
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function tarefaCard(t){
  const done = t.status==='concluida';
  const expired = t.status==='expirada';
  return `<div class="tarefa-card ${t.prioridade} ${done?'concluida':''} ${expired?'expirada':''}">
    <div class="tarefa-titulo ${done||expired?'riscado':''}">${escHtml(t.titulo)}</div>
    <div class="tarefa-meta">
      <span class="prio-badge ${expired?'expirada':t.prioridade||'normal'}">${expired?'⏰ Expirada':t.prioridade||'normal'}</span>
      ${t.criado_por==='recorrente'&&t.repeticoes_dia>1?`<span>🔁 ${t.repeticao_atual||1}/${t.repeticoes_dia}</span>`:''}
      ${t.prazo?`<span>⏰ Até ${new Date(t.prazo).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</span>`:''}
      ${t.descricao?`<span>${escHtml(t.descricao.slice(0,50))}</span>`:''}
    </div>
    ${!done&&!expired?`
    <div class="tarefa-actions">
      ${t.status!=='em_andamento'?`<button class="btn-action btn-andamento" onclick="marcarAndamento('${t.id}')">▶ Em andamento</button>`:'<span style="font-size:.72rem;color:#FFD600;font-weight:600">▶ Em andamento</span>'}
      <button class="btn-action btn-concluir" onclick="showConcluir('${t.id}')">✅ Concluir</button>
    </div>`:''}
    ${done&&t.prova_comentario?`
    <div class="prova-preview">
      ${t.prova_foto?`<img src="${t.prova_foto}" class="prova-img" alt="Prova">`:''}
      <div class="prova-comment">✅ ${escHtml(t.prova_comentario)}</div>
    </div>`:''}
  </div>`;
}

async function marcarAndamento(id){
  await sb.from('tarefas').update({status:'em_andamento'}).eq('id',id);
  const t = S.tarefas.find(x=>x.id===id);
  if(t) t.status='em_andamento';
  renderTarefas();
}

let fotosColetadas = [];

function showConcluir(id){
  fotosColetadas = [];
  const t = S.tarefas.find(x=>x.id===id);
  const repLabel = (t?.repeticoes_dia>1) ? ` (${t.repeticao_atual||1}/${t.repeticoes_dia})` : '';
  openModal(`
    <div class="modal-title">✅ Concluir tarefa</div>
    <div style="font-size:.85rem;color:var(--muted);margin-bottom:1.25rem">${escHtml((t?.titulo||'')+repLabel)}</div>
    <div class="fg">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem">
        <label class="lbl" style="margin:0">Fotos como prova</label>
        <button type="button" onclick="adicionarFoto()" style="background:rgba(0,255,136,.08);border:1px solid rgba(0,255,136,.2);color:var(--accent);font-size:.72rem;font-weight:600;padding:.3rem .75rem;border-radius:8px;cursor:pointer;font-family:var(--body)">+ Adicionar foto</button>
      </div>
      <input type="file" id="foto-inp-multi" capture="environment" style="display:none" onchange="processarFoto(this)">
      <div id="fotos-grid" style="display:flex;flex-wrap:wrap;gap:.5rem;min-height:70px;background:var(--card2);border:1.5px dashed var(--border2);border-radius:12px;padding:.75rem;margin-bottom:.375rem;align-items:center">
        <div id="fotos-empty" style="width:100%;text-align:center;color:var(--muted);font-size:.78rem;padding:.5rem 0">
          📸 Toque em "+ Adicionar foto" para tirar foto
        </div>
      </div>
      <div id="foto-err" style="display:none;background:rgba(255,61,107,.08);border:1px solid rgba(255,61,107,.2);border-radius:8px;padding:.625rem .875rem;margin-top:.375rem">
        <div id="foto-err-text" style="font-size:.75rem;color:var(--error);line-height:1.5"></div>
      </div>
    </div>
    <div class="fg">
      <label class="lbl">Comentário *</label>
      <textarea class="inp" id="prova-comment" rows="3" placeholder="Descreva o que foi feito..." style="resize:none"></textarea>
    </div>
    <button class="btn-modal primary" id="btn-confirmar" onclick="confirmarConclusao('${id}')">✅ Confirmar conclusão</button>
    <button class="btn-modal outline" onclick="closeModal()">Cancelar</button>
  `);
}

function adicionarFoto(){
  const inp = document.getElementById('foto-inp-multi');
  if(inp){ inp.value=''; inp.click(); }
}

function processarFoto(input){
  const file = input.files[0];
  if(!file) return;

  const diffMinutos = (Date.now() - file.lastModified) / 1000 / 60;
  if(diffMinutos > 5){
    const mins = Math.round(diffMinutos);
    const tempo = mins > 60 ? Math.round(mins/60) + ' hora(s)' : mins + ' minuto(s)';
    const errEl = document.getElementById('foto-err');
    const errText = document.getElementById('foto-err-text');
    if(errEl) errEl.style.display = 'block';
    if(errText) errText.textContent = `⚠️ Foto tirada há ${tempo}. Tire uma nova foto agora.`;
    return;
  }

  const errEl = document.getElementById('foto-err');
  if(errEl) errEl.style.display = 'none';

  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.width;
      canvas.height = img.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      const agora = new Date();
      const ts = agora.toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'});
      const label = `${S.usuario?.nome||'Funcionário'} · ${ts}`;
      const fontSize = Math.max(16, Math.round(img.width * 0.03));
      ctx.font = `bold ${fontSize}px monospace`;
      const tw = ctx.measureText(label).width;
      const pad = fontSize * 0.5;
      const bh = fontSize + pad * 2;
      ctx.fillStyle = 'rgba(0,0,0,0.75)';
      ctx.fillRect(0, img.height - bh, tw + pad * 2, bh);
      ctx.fillStyle = '#00FF88';
      ctx.fillText(label, pad, img.height - pad * 0.8);
      canvas.toBlob(blob => {
        const fotoFile = new File([blob], `prova_${Date.now()}.jpg`, {type:'image/jpeg'});
        const idx = fotosColetadas.length;
        fotosColetadas.push(fotoFile);
        const url = canvas.toDataURL('image/jpeg', 0.85);
        const grid = document.getElementById('fotos-grid');
        const empty = document.getElementById('fotos-empty');
        if(empty) empty.style.display = 'none';
        const thumb = document.createElement('div');
        thumb.style.cssText = 'position:relative;width:80px;height:80px;flex-shrink:0';
        thumb.innerHTML = `<img src="${url}" style="width:80px;height:80px;object-fit:cover;border-radius:8px;display:block"><button onclick="removerFoto(${idx},this.parentElement)" style="position:absolute;top:-5px;right:-5px;width:22px;height:22px;border-radius:50%;background:var(--error);border:2px solid var(--black);color:white;font-size:.7rem;cursor:pointer;line-height:1;font-weight:700">✕</button>`;
        if(grid) grid.appendChild(thumb);
      }, 'image/jpeg', 0.85);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function removerFoto(idx, el){
  fotosColetadas.splice(idx, 1);
  if(el) el.remove();
  if(fotosColetadas.length === 0){
    const empty = document.getElementById('fotos-empty');
    if(empty) empty.style.display = 'block';
  }
}

async function confirmarConclusao(id){
  const comment = document.getElementById('prova-comment')?.value.trim();
  if(!comment){ toast('⚠️ Escreva um comentário', false); return; }

  const btn = document.getElementById('btn-confirmar');
  btn.disabled=true; btn.textContent='Enviando...';

  try{
    const fotosUrls = [];
    for(let i=0; i<fotosColetadas.length; i++){
      btn.textContent = `Enviando foto ${i+1}/${fotosColetadas.length}...`;
      const path = `${S.company.id}/${id}-${Date.now()}-${i}.jpg`;
      const { error: upErr } = await sb.storage.from('provas').upload(path, fotosColetadas[i]);
      if(!upErr){
        const { data: urlData } = sb.storage.from('provas').getPublicUrl(path);
        fotosUrls.push(urlData.publicUrl);
      }
    }

    const updateData = {
      status: 'concluida',
      prova_comentario: comment,
      prova_foto: fotosUrls[0]||null,
      provas_fotos: fotosUrls.length>0 ? fotosUrls : null,
      concluido_por: S.usuario.id,
      concluido_em: new Date().toISOString()
    };

    const { error } = await sb.from('tarefas').update(updateData).eq('id', id);
    if(error) throw error;

    const t = S.tarefas.find(x=>x.id===id);
    if(t) Object.assign(t, updateData);

    fotosColetadas = [];
    closeModal();
    toast(`✅ Concluída com ${fotosUrls.length} foto(s)!`);
    renderTarefas();

  }catch(e){
    console.error('Erro conclusão:', e);
    toast('⚠️ Erro ao enviar. Tente novamente.', false);
    btn.disabled=false; btn.textContent='✅ Confirmar conclusão';
  }
}


async function marcarAndamento(id){
  await sb.from('tarefas').update({status:'em_andamento'}).eq('id',id);
  const t = S.tarefas.find(x=>x.id===id);
  if(t) t.status='em_andamento';
  renderTarefas();
}

// ── PRESENÇA ──────────────────────────────────────────
async function loadPresencas(){
  const hoje = new Date().toISOString().split('T')[0];
  const { data } = await sb.from('presencas')
    .select('*')
    .eq('company_id', S.company.id)
    .eq('usuario_id', S.usuario.id)
    .gte('created_at', hoje + 'T00:00:00')
    .order('created_at', {ascending: true});
  S.presencas = data || [];
  // Verificar status atual
  if(S.presencas.length > 0){
    const ultima = S.presencas[S.presencas.length-1];
    S.presencaHoje = ultima;
  }
}

async function registrarPresenca(tipo){
  try{
    const { data, error } = await sb.from('presencas').insert({
      company_id: S.company.id,
      usuario_id: S.usuario.id,
      tipo,
      hora: new Date().toISOString()
    }).select().single();
    if(error) throw error;
    S.presencas.push(data);
    S.presencaHoje = data;
    toast(tipo === 'entrada' ? '✅ Entrada registrada!' : '👋 Saída registrada!');
    renderPresenca();
  }catch(e){
    console.error(e);
    toast('⚠️ Erro ao registrar. Tente novamente.', false);
  }
}

async function renderPerformance(){
  const el = document.getElementById('content');
  el.innerHTML = `<div style="text-align:center;padding:2rem;color:var(--muted)">Carregando...</div>`;

  const from7 = new Date();
  from7.setDate(from7.getDate()-6);
  from7.setHours(0,0,0,0);

  const { data: historico } = await sb.from('tarefas')
    .select('*')
    .eq('company_id', S.company.id)
    .eq('atribuido_para', S.usuario.id)
    .eq('recorrente', false)
    .gte('created_at', from7.toISOString());

  const tarefas = historico || [];
  const concluidas = tarefas.filter(t=>t.status==='concluida').length;
  const expiradas = tarefas.filter(t=>t.status==='expirada').length;
  const total = concluidas + expiradas;
  const score = total > 0 ? Math.round((concluidas/total)*100) : 0;
  const scoreColor = score>=80?'var(--accent)':score>=50?'#FFD600':'var(--error)';

  const dias = [];
  for(let i=6;i>=0;i--){
    const d = new Date(); d.setDate(d.getDate()-i); d.setHours(0,0,0,0);
    const next = new Date(d); next.setDate(next.getDate()+1);
    const dayTasks = tarefas.filter(t=>{ const ct=new Date(t.created_at); return ct>=d&&ct<next; });
    dias.push({
      label: d.toLocaleDateString('pt-BR',{weekday:'short'}).slice(0,3),
      concluidas: dayTasks.filter(t=>t.status==='concluida').length,
      expiradas: dayTasks.filter(t=>t.status==='expirada').length,
    });
  }
  const maxVal = Math.max(...dias.map(d=>d.concluidas+d.expiradas), 1);

  el.innerHTML = `
    <div class="perf-header">
      <div class="perf-av" style="background:${avColor(S.usuario?.nome||'')}">${initials(S.usuario?.nome||'')}</div>
      <div>
        <div class="perf-name">${escHtml(S.usuario?.nome||'')}</div>
        <div class="perf-role">${S.usuario?.perfil||'funcionário'} · ${escHtml(S.company?.nome||'')}</div>
      </div>
    </div>

    <div class="perf-score">
      <div class="score-num" style="color:${scoreColor}">${score}%</div>
      <div class="score-label">Taxa de conclusão — 7 dias</div>
      <div class="score-bar"><div class="score-fill" style="width:${score}%;background:${scoreColor}"></div></div>
    </div>

    <div class="stats-row">
      <div class="stat-mini"><div class="stat-mini-val" style="color:var(--accent)">${concluidas}</div><div class="stat-mini-label">✅ Concluídas</div></div>
      <div class="stat-mini"><div class="stat-mini-val" style="color:var(--error)">${expiradas}</div><div class="stat-mini-label">⏰ Expiradas</div></div>
    </div>

    <div class="chart-wrap">
      <div class="chart-title">Tarefas por dia</div>
      <div class="chart-bars">
        ${dias.map(d=>{
          const hC = d.concluidas>0?Math.max(8,Math.round((d.concluidas/maxVal)*72)):0;
          const hE = d.expiradas>0?Math.max(8,Math.round((d.expiradas/maxVal)*72)):0;
          return`<div class="chart-col">
            <div class="chart-bar-wrap">
              ${hE>0?`<div class="bar-expirada" style="height:${hE}px"></div>`:''}
              ${hC>0?`<div class="bar-concluida" style="height:${hC}px"></div>`:''}
              ${hC===0&&hE===0?`<div style="height:2px;background:var(--border);border-radius:2px"></div>`:''}
            </div>
            <div class="chart-day">${d.label}</div>
          </div>`;
        }).join('')}
      </div>
      <div style="display:flex;gap:1rem;margin-top:.875rem;justify-content:center">
        <div style="display:flex;align-items:center;gap:.375rem;font-size:.68rem;color:var(--muted)"><div style="width:8px;height:8px;border-radius:2px;background:var(--accent)"></div>Concluída</div>
        <div style="display:flex;align-items:center;gap:.375rem;font-size:.68rem;color:var(--muted)"><div style="width:8px;height:8px;border-radius:2px;background:var(--error)"></div>Expirada</div>
      </div>
    </div>

    <div style="background:${score>=80?'rgba(0,255,136,.06)':score>=50?'rgba(255,214,0,.06)':'rgba(255,61,107,.06)'};border:1px solid ${score>=80?'rgba(0,255,136,.15)':score>=50?'rgba(255,214,0,.15)':'rgba(255,61,107,.15)'};border-radius:12px;padding:1rem;text-align:center">
      <div style="font-size:1.5rem;margin-bottom:.375rem">${score>=80?'🌟':score>=50?'💪':'⚡'}</div>
      <div style="font-size:.85rem;font-weight:600;margin-bottom:.25rem">${score>=80?'Excelente desempenho!':score>=50?'Bom trabalho, pode melhorar!':'Atenção: muitas tarefas expiradas'}</div>
      <div style="font-size:.75rem;color:var(--muted)">${score>=80?'Continue assim!':score>=50?'Tente concluir antes do prazo.':'Converse com seu gerente.'}</div>
    </div>
  `;
}

function renderPresenca(){
  const el = document.getElementById('content');
  const ultima = S.presencaHoje;
  const estaPresente = ultima?.tipo === 'entrada';
  const hojeStr = new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});

  // Calcular horas trabalhadas hoje
  let horasTrabalhadas = '—';
  let minutosTotais = 0;
  for(let i=0; i<S.presencas.length-1; i++){
    const curr = S.presencas[i];
    const next = S.presencas[i+1];
    if(curr.tipo==='entrada' && next.tipo==='saida'){
      minutosTotais += (new Date(next.hora) - new Date(curr.hora)) / 1000 / 60;
    }
  }
  if(estaPresente && ultima){
    minutosTotais += (Date.now() - new Date(ultima.hora)) / 1000 / 60;
  }
  if(minutosTotais > 0){
    const h = Math.floor(minutosTotais/60);
    const m = Math.round(minutosTotais%60);
    horasTrabalhadas = `${h}h${m.toString().padStart(2,'0')}min`;
  }

  el.innerHTML = `
    <div style="font-size:.72rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:1rem;text-align:center">${hojeStr}</div>

    <div class="status-card" style="border-color:${estaPresente?'rgba(0,255,136,.2)':'var(--border)'}">
      <div class="status-icon">${estaPresente?'🟢':'🔴'}</div>
      <div class="status-title">${estaPresente?'Você está presente':'Você não registrou entrada'}</div>
      <div class="status-sub">${ultima?`Último registro: ${new Date(ultima.hora).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})} (${ultima.tipo})`:'Nenhum registro hoje'}</div>
      ${minutosTotais>0?`<div style="margin-top:.75rem;font-family:var(--font);font-size:1.5rem;font-weight:900;color:var(--accent)">${horasTrabalhadas}</div><div style="font-size:.7rem;color:var(--muted)">trabalhadas hoje</div>`:''}
    </div>

    ${estaPresente
      ? `<button class="btn-presenca btn-saida" onclick="registrarPresenca('saida')">🚪 Registrar Saída</button>`
      : `<button class="btn-presenca btn-entrada" onclick="registrarPresenca('entrada')">✅ Registrar Entrada</button>`
    }

    ${S.presencas.length>0?`
    <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.125rem">
      <div style="font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.875rem">Registros de hoje</div>
      ${S.presencas.map(p=>`
        <div class="presenca-row">
          <div class="presenca-tipo" style="background:${p.tipo==='entrada'?'rgba(0,255,136,.1)':'rgba(255,61,107,.1)'}">
            ${p.tipo==='entrada'?'✅':'🚪'}
          </div>
          <div style="flex:1">
            <div style="font-size:.82rem;font-weight:600;text-transform:capitalize">${p.tipo}</div>
            <div style="font-size:.72rem;color:var(--muted)">${new Date(p.hora).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}</div>
          </div>
        </div>
      `).join('')}
    </div>`:''}
  `;
}

  const { data } = await sb.auth.getSession();
  if(data?.session?.user) await initApp(data.session.user);
