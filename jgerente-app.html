<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>JgerenteAI — Painel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;900&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ── RESET & VARS ── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#050508;--white:#F5F3EE;
  --accent:#00FF88;--error:#FF3D6B;--warning:#FFD600;
  --card:#0D0D14;--card2:#111118;
  --muted:#8B8B99;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --font:'Unbounded',sans-serif;--body:'DM Sans',sans-serif;
  --sidebar:220px;--r:10px;
}
html,body{height:100%;overflow:hidden;background:var(--black);color:var(--white);font-family:var(--body)}

/* ── LOGIN ── */
#login-screen{position:fixed;inset:0;background:var(--black);display:flex;align-items:center;justify-content:center;z-index:999;padding:1.5rem}
.login-box{width:100%;max-width:380px;background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:2rem}
.login-logo{font-family:var(--font);font-weight:900;font-size:1rem;text-align:center;margin-bottom:1.75rem}
.login-logo .j{color:var(--accent)}
.fg{margin-bottom:.875rem}
.lbl{display:block;font-size:.72rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.375rem}
.inp{width:100%;padding:.8rem 1rem;background:var(--card2);border:1.5px solid var(--border2);border-radius:var(--r);font-size:.88rem;color:var(--white);font-family:var(--body);outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--accent)}
.btn-login{width:100%;padding:.875rem;background:var(--accent);color:var(--black);border:none;border-radius:var(--r);font-family:var(--font);font-size:.82rem;font-weight:700;cursor:pointer;transition:all .2s}
.btn-login:hover{opacity:.9}
.login-err{font-size:.72rem;color:var(--error);text-align:center;margin-top:.5rem;min-height:16px}
.login-link{text-align:center;margin-top:1rem;font-size:.78rem;color:var(--muted)}
.login-link a{color:var(--accent);text-decoration:none;font-weight:600}

/* ── APP LAYOUT ── */
#app{display:none;height:100vh;overflow:hidden}
#app.show{display:flex}
.sidebar{width:var(--sidebar);flex-shrink:0;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;overflow:hidden}
.main{flex:1;overflow-y:auto;height:100vh;background:var(--black);-webkit-overflow-scrolling:touch}

/* ── SIDEBAR ── */
.sb-logo{font-family:var(--font);font-weight:900;font-size:.9rem;padding:1.25rem 1rem .875rem;letter-spacing:-.02em}
.sb-logo .j{color:var(--accent)}
.sb-company{padding:.625rem 1rem;margin:.25rem .75rem;background:rgba(0,255,136,.06);border:1px solid rgba(0,255,136,.1);border-radius:10px;margin-bottom:.5rem}
.sb-company-name{font-size:.78rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-company-plan{font-size:.65rem;color:var(--muted);margin-top:.15rem}
.sb-nav{flex:1;padding:.5rem .75rem;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.sb-section{font-size:.62rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;padding:.625rem .5rem .25rem}
.sb-btn{display:flex;align-items:center;gap:.625rem;padding:.625rem .75rem;border-radius:8px;background:none;border:none;color:var(--muted);font-family:var(--body);font-size:.82rem;cursor:pointer;width:100%;text-align:left;transition:all .15s}
.sb-btn:hover{background:rgba(255,255,255,.04);color:var(--white)}
.sb-btn.active{background:rgba(0,255,136,.08);color:var(--accent)}
.sb-icon{font-size:1rem;width:20px;text-align:center;flex-shrink:0}
.sb-footer{padding:.875rem 1rem;border-top:1px solid var(--border)}
.sb-user{display:flex;align-items:center;gap:.625rem}
.sb-avatar{width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-family:var(--font);font-size:.65rem;font-weight:700;color:var(--black);flex-shrink:0}
.sb-user-name{font-size:.78rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-user-role{font-size:.65rem;color:var(--muted)}
.btn-sair{margin-top:.5rem;width:100%;padding:.5rem;background:none;border:1px solid var(--border2);color:var(--muted);border-radius:8px;font-family:var(--body);font-size:.72rem;cursor:pointer}
.btn-sair:hover{border-color:var(--error);color:var(--error)}

/* ── MAIN CONTENT ── */
.main-header{padding:1.5rem 1.5rem 0;display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.page-title{font-family:var(--font);font-size:1.25rem;font-weight:900;letter-spacing:-.03em}
.page-sub{font-size:.78rem;color:var(--muted);margin-top:.2rem}
.content{padding:1.25rem 1.5rem}

/* ── CARDS ── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;margin-bottom:1.25rem}
.metric-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.125rem}
.metric-card.green{border-color:rgba(0,255,136,.15)}
.metric-card.blue{border-color:rgba(0,204,255,.15)}
.metric-card.yellow{border-color:rgba(255,214,0,.15)}
.metric-card.red{border-color:rgba(255,61,107,.15)}
.metric-label{font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.375rem}
.metric-val{font-family:var(--font);font-size:1.75rem;font-weight:900;line-height:1}
.metric-sub{font-size:.7rem;color:var(--muted);margin-top:.25rem}

/* ── SEC CARDS ── */
.sec-card{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:1rem;overflow:hidden}
.sec-card-header{padding:.875rem 1.25rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.sec-card-title{font-size:.82rem;font-weight:700}
.sec-card-body{padding:1rem 1.25rem}
.btn-add{padding:.4rem .875rem;background:rgba(0,255,136,.08);border:1px solid rgba(0,255,136,.15);color:var(--accent);border-radius:8px;font-family:var(--font);font-size:.68rem;font-weight:700;cursor:pointer;transition:all .2s}
.btn-add:hover{background:rgba(0,255,136,.15)}

/* ── ALERT ── */
.alert-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1rem 1.25rem;display:flex;align-items:flex-start;gap:.875rem;margin-bottom:.75rem}
.alert-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.alert-dot.green{background:var(--accent)}
.alert-dot.yellow{background:var(--warning)}
.alert-dot.red{background:var(--error)}
.alert-title{font-size:.82rem;font-weight:700;margin-bottom:.2rem}
.alert-text{font-size:.75rem;color:var(--muted);line-height:1.5}

/* ── PRIO BADGE ── */
.prio-badge{font-size:.62rem;font-weight:700;padding:.2rem .5rem;border-radius:100px}
.prio-badge.urgente{background:rgba(255,61,107,.12);color:var(--error)}
.prio-badge.alta{background:rgba(255,214,0,.12);color:var(--warning)}
.prio-badge.normal{background:rgba(255,255,255,.06);color:var(--muted)}

/* ── ACTIVITY ── */
.activity-item{display:flex;align-items:flex-start;gap:.75rem;padding:.625rem 0;border-bottom:1px solid var(--border)}
.activity-item:last-child{border-bottom:none}
.activity-icon{width:28px;height:28px;border-radius:8px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0}
.activity-text{font-size:.8rem;flex:1;min-width:0}

/* ── EQUIPE ── */
.member-card{display:flex;align-items:center;gap:.875rem;padding:.875rem 0;border-bottom:1px solid var(--border)}
.member-card:last-child{border-bottom:none}
.member-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font);font-size:.72rem;font-weight:700;color:var(--black);flex-shrink:0}
.member-info{flex:1;min-width:0}
.member-name{font-size:.85rem;font-weight:700}
.member-role{font-size:.72rem;color:var(--muted);margin-top:.1rem}
.member-actions{display:flex;gap:.375rem;flex-shrink:0}
.btn-action{padding:.375rem .625rem;border-radius:6px;font-size:.68rem;font-weight:600;cursor:pointer;font-family:var(--body);border:none;transition:all .2s}
.btn-edit{background:rgba(255,255,255,.06);color:var(--white)}
.btn-danger{background:rgba(255,61,107,.08);color:var(--error);border:1px solid rgba(255,61,107,.15)!important}

/* ── PRESENÇA ── */
.presenca-row{display:flex;align-items:center;gap:.75rem;padding:.625rem 0;border-bottom:1px solid var(--border);font-size:.82rem}
.presenca-row:last-child{border-bottom:none}
.p-badge{font-size:.65rem;font-weight:700;padding:.2rem .5rem;border-radius:100px}
.p-badge.entrada{background:rgba(0,255,136,.12);color:var(--accent)}
.p-badge.saida{background:rgba(255,61,107,.1);color:var(--error)}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:none;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.show{display:flex}
.modal-box{background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:1.75rem;width:100%;max-width:460px;max-height:90vh;overflow-y:auto}
.modal-title{font-family:var(--font);font-size:.88rem;font-weight:700;margin-bottom:1.25rem}
.modal-actions{display:flex;gap:.5rem;margin-top:1rem}
.btn-primary{flex:1;padding:.875rem;background:var(--accent);color:var(--black);border:none;border-radius:var(--r);font-family:var(--font);font-size:.78rem;font-weight:700;cursor:pointer}
.btn-outline{flex:1;padding:.875rem;background:none;border:1px solid var(--border2);color:var(--muted);border-radius:var(--r);font-family:var(--font);font-size:.78rem;font-weight:700;cursor:pointer}

/* ── CHAT ── */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 60px)}
.chat-agents{display:flex;gap:.5rem;padding:1rem 1.5rem;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.agent-pill{padding:.5rem 1rem;border-radius:100px;font-size:.72rem;font-weight:600;cursor:pointer;border:1.5px solid var(--border2);background:none;color:var(--muted);font-family:var(--body);white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:.375rem}
.agent-pill.active{border-color:var(--accent);color:var(--accent);background:rgba(0,255,136,.06)}
.chat-messages{flex:1;overflow-y:auto;padding:1.25rem;display:flex;flex-direction:column;gap:.875rem}
.chat-msg{display:flex;gap:.625rem;max-width:85%}
.chat-msg.user{align-self:flex-end;flex-direction:row-reverse}
.chat-msg.ai{align-self:flex-start}
.chat-av{width:30px;height:30px;border-radius:50%;background:var(--card2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;margin-top:2px}
.chat-bubble{padding:.75rem 1rem;border-radius:14px;font-size:.83rem;line-height:1.65}
.chat-msg.user .chat-bubble{background:var(--accent);color:var(--black);border-radius:14px 14px 4px 14px}
.chat-msg.ai .chat-bubble{background:var(--card2);border:1px solid var(--border);border-radius:14px 14px 14px 4px}
.chat-input-area{padding:.875rem 1.25rem;border-top:1px solid var(--border);flex-shrink:0;display:flex;gap:.625rem}
.chat-inp{flex:1;padding:.75rem 1rem;background:var(--card2);border:1.5px solid var(--border2);border-radius:12px;font-size:.85rem;color:var(--white);font-family:var(--body);outline:none;resize:none}
.chat-inp:focus{border-color:var(--accent)}
.chat-send{padding:.75rem 1.25rem;background:var(--accent);color:var(--black);border:none;border-radius:12px;font-family:var(--font);font-size:.75rem;font-weight:700;cursor:pointer}
.chat-send:disabled{opacity:.4;cursor:not-allowed}
.typing-dots{display:inline-flex;gap:3px;padding:.25rem}
.typing-dots span{width:5px;height:5px;border-radius:50%;background:var(--muted);animation:bop .8s infinite}
.typing-dots span:nth-child(2){animation-delay:.15s}
.typing-dots span:nth-child(3){animation-delay:.3s}
@keyframes bop{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

/* ── TOAST ── */
#toast{position:fixed;top:1rem;right:1rem;z-index:9999;background:var(--card2);border:1px solid var(--border2);padding:.625rem 1.25rem;border-radius:100px;font-size:.78rem;font-weight:600;display:none;max-width:300px;pointer-events:none}
#toast.show{display:block}

/* ── SCORE ── */
.score-bar{height:8px;background:var(--border);border-radius:100px;overflow:hidden;margin:.5rem 0}
.score-fill{height:100%;border-radius:100px;transition:width .8s ease}

/* ── MOBILE ── */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--card);border-top:1px solid var(--border);padding:.5rem .25rem;padding-bottom:calc(.5rem + env(safe-area-inset-bottom));justify-content:space-around;align-items:center}
.bn-btn{display:flex;flex-direction:column;align-items:center;gap:.2rem;background:none;border:none;color:var(--muted);font-size:.55rem;font-family:var(--body);font-weight:600;cursor:pointer;padding:.375rem .5rem;border-radius:10px;transition:all .15s;min-width:48px}
.bn-btn.active{color:var(--accent);background:rgba(0,255,136,.08)}
.bn-icon{font-size:1.2rem;line-height:1}

/* MAIS MENU */
#mais-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300}
#mais-menu{display:none;position:fixed;bottom:0;left:0;right:0;z-index:400;background:var(--card);border-radius:20px 20px 0 0;border:1px solid var(--border2);border-bottom:none;max-height:80vh;overflow-y:auto;padding:0 1rem calc(1rem + env(safe-area-inset-bottom))}
.mais-handle{width:36px;height:4px;background:var(--border2);border-radius:100px;margin:.875rem auto .75rem}
.mais-section{font-family:var(--font);font-size:.65rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.625rem;margin-top:.75rem}
.mais-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:.5rem}
.mais-btn{display:flex;align-items:center;gap:.625rem;padding:.875rem;background:var(--card2);border:1px solid var(--border2);border-radius:12px;cursor:pointer;font-family:var(--body);text-align:left;color:var(--white);transition:all .15s}
.mais-btn:hover{border-color:var(--accent)}
.mais-btn.danger{border-color:rgba(255,61,107,.15);color:var(--error)}
.mais-btn-icon{font-size:1.2rem;flex-shrink:0}
.mais-btn-title{font-size:.75rem;font-weight:700;display:block}
.mais-btn-sub{font-size:.62rem;color:var(--muted);display:block;margin-top:.1rem}

@media(max-width:768px){
  .sidebar{display:none}
  .main{padding-bottom:70px;height:100vh}
  .bottom-nav{display:flex}
  #app.show{flex-direction:column}
  .cards-grid{grid-template-columns:1fr 1fr}
  .main-header{padding:1rem 1rem 0}
  .content{padding:1rem}
}
@media(max-width:400px){
  .cards-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo"><span class="j">J</span>gerenteAI</div>
    <div class="fg"><label class="lbl">Email</label><input class="inp" id="l-email" type="email" placeholder="seu@email.com" autocomplete="email"></div>
    <div class="fg"><label class="lbl">Senha</label><input class="inp" id="l-pwd" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn-login" id="l-btn" onclick="doLogin()">🔐 Entrar</button>
    <div class="login-err" id="l-err"></div>
    <div class="login-link">Não tem conta? <a href="jgerente-cadastro.html">Criar grátis →</a></div>
  </div>
</div>

<!-- APP -->
<div id="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-logo"><span class="j">J</span>gerenteAI</div>
    <div class="sb-company">
      <div class="sb-company-name" id="sb-company-name">Carregando...</div>
      <div class="sb-company-plan" id="sb-company-plan">⚡ Trial ativo</div>
    </div>
    <div class="sb-nav">
      <div class="sb-section">Principal</div>
      <button class="sb-btn active" id="sb-dashboard" onclick="navTo('dashboard')"><span class="sb-icon">🏠</span>Dashboard</button>
      <button class="sb-btn" id="sb-tarefas" onclick="navTo('tarefas')"><span class="sb-icon">📋</span>Tarefas</button>
      <button class="sb-btn" id="sb-equipe" onclick="navTo('equipe')"><span class="sb-icon">👥</span>Equipe</button>
      <button class="sb-btn" id="sb-presenca" onclick="navTo('presenca')"><span class="sb-icon">🕐</span>Presença</button>
      <div class="sb-section">Agentes</div>
      <button class="sb-btn" id="sb-chat" onclick="navTo('chat')"><span class="sb-icon">💬</span>IA Gerente</button>
      <button class="sb-btn" id="sb-agentes" onclick="navTo('agentes')"><span class="sb-icon">🤖</span>Meus Agentes</button>
      <button class="sb-btn" id="sb-fidelidade" onclick="navTo('fidelidade')"><span class="sb-icon">🎯</span>Fidelidade</button>
      <button class="sb-btn" id="sb-financeiro" onclick="window.location.href='jgerente-financeiro.html'"><span class="sb-icon">💰</span>Financeiro ↗</button>
      <button class="sb-btn" id="sb-social" onclick="window.location.href='jgerente-social.html'"><span class="sb-icon">📱</span>Social Mídia ↗</button>
      <button class="sb-btn" id="sb-contabilidade" onclick="navTo('contabilidade')"><span class="sb-icon">📊</span>Contabilidade</button>
      <div class="sb-section">Sistema</div>
      <button class="sb-btn" id="sb-mural" onclick="navTo('mural')"><span class="sb-icon">🏆</span>Mural</button>
      <button class="sb-btn" id="sb-auditoria" onclick="navTo('auditoria')"><span class="sb-icon">🔍</span>Auditoria</button>
      <button class="sb-btn" id="sb-config" onclick="navTo('config')"><span class="sb-icon">⚙️</span>Configurações</button>
    </div>
    <div class="sb-footer">
      <div class="sb-user">
        <div class="sb-avatar" id="sb-avatar">JG</div>
        <div>
          <div class="sb-user-name" id="sb-user-name">Usuário</div>
          <div class="sb-user-role">👑 Dono</div>
        </div>
      </div>
      <button class="btn-sair" onclick="doLogout()">🚪 Sair</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main" id="main">
    <div style="padding:3rem;text-align:center;color:var(--muted)">
      <div style="font-size:2rem;margin-bottom:.5rem">⚡</div>
      Carregando...
    </div>
  </div>

</div>

<!-- BOTTOM NAV (MOBILE) -->
<div class="bottom-nav" id="bottom-nav">
  <button class="bn-btn active" id="bn-dashboard" onclick="navTo('dashboard')"><span class="bn-icon">🏠</span>Início</button>
  <button class="bn-btn" id="bn-tarefas" onclick="navTo('tarefas')"><span class="bn-icon">📋</span>Tarefas</button>
  <button class="bn-btn" id="bn-equipe" onclick="navTo('equipe')"><span class="bn-icon">👥</span>Equipe</button>
  <button class="bn-btn" id="bn-chat" onclick="navTo('chat')"><span class="bn-icon">💬</span>IA</button>
  <button class="bn-btn" id="bn-mais" onclick="toggleMaisMenu()"><span class="bn-icon">☰</span>Mais</button>
</div>

<!-- MAIS MENU -->
<div id="mais-overlay" onclick="closeMaisMenu()"></div>
<div id="mais-menu">
  <div class="mais-handle"></div>
  <div class="mais-section">Agentes</div>
  <div class="mais-grid">
    <button class="mais-btn" onclick="closeMaisMenu();navTo('fidelidade')"><span class="mais-btn-icon">🎯</span><span><span class="mais-btn-title">Fidelidade</span><span class="mais-btn-sub">Pontos e clientes</span></span></button>
    <button class="mais-btn" onclick="closeMaisMenu();window.location.href='jgerente-financeiro.html'"><span class="mais-btn-icon">💰</span><span><span class="mais-btn-title">Financeiro</span><span class="mais-btn-sub">Fluxo de caixa</span></span></button>

function renderMd(text){
  if(!text) return '';
  var t = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  var lines = t.split(/\r?\n/);
  var r = lines.map(function(l){
    if(l.indexOf('### ')===0) return '<b style="display:block;margin:.4rem 0 .1rem">'+l.slice(4)+'</b>';
    if(l.indexOf('## ')===0) return '<b style="display:block;margin:.5rem 0 .15rem">'+l.slice(3)+'</b>';
    if(l.indexOf('* ')===0||l.indexOf('- ')===0) return '<div style="padding-left:.625rem;margin:.1rem 0">&bull; '+l.slice(2)+'</div>';
    var nm = l.match(/^(\d+)\. (.+)$/);
    if(nm) return '<div style="padding-left:.625rem;margin:.1rem 0"><b>'+nm[1]+'.</b> '+nm[2]+'</div>';
    if(l==='---') return '<hr style="border:none;border-top:1px solid var(--border);margin:.4rem 0">';
    return l ? '<div>'+l+'</div>' : '<div style="height:.3rem"></div>';
  }).join('');
  return r.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/\*(.+?)\*/g,'<i>$1</i>');
}

// ── SCORE DE SAÚDE ──
function calcScore(){
  var total = S.tarefas.filter(function(t){ return !t.tarefa_pai_id; }).length;
  var concluidas = S.tarefas.filter(function(t){ return t.status==='concluida'; }).length;
  var taxaT = total>0 ? concluidas/total : 0;
  var pT = Math.round(taxaT*25);

  var funcs = S.equipe.filter(function(m){ return m.id!==S.usuario.id && m.ativo!==false; }).length;
  var presentes = new Set(S.presencas.filter(function(p){ return p.tipo==='entrada'; }).map(function(p){ return p.usuario_id; })).size;
  var pP = funcs>0 ? Math.round((Math.min(1,presentes/funcs))*20) : 0;

  var cl = S.customers.length;
  var pC = cl===0?0:cl<10?8:cl<50?14:cl<100?18:20;

  var ag = (S.agentes||[]).filter(function(a){ return a.ativo; }).length;
  var pA = ag===0?0:ag===1?5:10;

  var pE = funcs===0?0:funcs===1?5:10;

  var score = pT+pP+pC+15+pA+pE;
  var cor = score>=80?'var(--accent)':score>=60?'var(--warning)':score>=40?'rgba(255,149,0,1)':'var(--error)';
  var status = score>=80?'Excelente':score>=60?'Bom':score>=40?'Atenção':'Crítico';
  return {score,cor,status};
}

// ── TAREFAS FUNCTIONS ──

function agruparTarefas(tarefas){
  // Separar tarefas modelo (recorrentes) das filhas
  const modelos = tarefas.filter(t=>t.recorrente);
  const filhas = tarefas.filter(t=>t.tarefa_pai);
  const normais = tarefas.filter(t=>!t.recorrente && !t.tarefa_pai);

  // Agrupar filhas por tarefa_pai
  const grupos = {};
  filhas.forEach(t=>{
    if(!grupos[t.tarefa_pai]) grupos[t.tarefa_pai] = [];
    grupos[t.tarefa_pai].push(t);
  });

  // Montar lista final
  const resultado = [...normais];

  // Adicionar modelos com seus grupos
  modelos.forEach(m=>{
    resultado.push({...m, _filhas: grupos[m.id]||[]});
  });

  // Adicionar filhas que não têm modelo na lista (modelo deletado)
  Object.keys(grupos).forEach(paiId=>{
    const temModelo = modelos.find(m=>m.id===paiId);
    if(!temModelo){
      grupos[paiId].forEach(f=>resultado.push(f));
    }
  });

  return resultado;
}

function calcularHorarios(){
  const reps = parseInt(document.getElementById('t-repeticoes')?.value)||1;
  const inicio = document.getElementById('t-hora-inicio')?.value||'08:00';
  const fim = document.getElementById('t-hora-fim')?.value||'18:00';
  const preview = document.getElementById('horarios-preview');
  if(!preview) return;

  const [hI, mI] = inicio.split(':').map(Number);
  const [hF, mF] = fim.split(':').map(Number);
  const totalMins = (hF*60+mF) - (hI*60+mI);
  if(totalMins <= 0){ preview.innerHTML = '<span style="font-size:.72rem;color:var(--error)">⚠️ Horário inválido</span>'; return; }

  const interval = reps > 1 ? Math.floor(totalMins/(reps-1)) : 0;
  const horarios = [];
  for(let i=0; i<reps; i++){
    const mins = hI*60 + mI + (interval*i);
    const h = Math.floor(mins/60).toString().padStart(2,'0');
    const m = (mins%60).toString().padStart(2,'0');
    horarios.push(`${h}:${m}`);
  }

  preview.innerHTML = horarios.map(function(h,i){ return '<span style="background:rgba(0,255,136,.08);border:1px solid rgba(0,255,136,.15);color:var(--accent);padding:.2rem .5rem;border-radius:100px;font-size:.7rem;font-weight:600">'+(i+1)+'ª '+h+'</span>'; }).join('');
}

}

function agruparTarefas(tarefas){
  // Separar tarefas modelo (recorrentes) das filhas
  const modelos = tarefas.filter(t=>t.recorrente);
  const filhas = tarefas.filter(t=>t.tarefa_pai);
  const normais = tarefas.filter(t=>!t.recorrente && !t.tarefa_pai);

  // Agrupar filhas por tarefa_pai
  const grupos = {};
  filhas.forEach(t=>{
    if(!grupos[t.tarefa_pai]) grupos[t.tarefa_pai] = [];
    grupos[t.tarefa_pai].push(t);
  });

  // Montar lista final
  const resultado = [...normais];

  // Adicionar modelos com seus grupos
  modelos.forEach(m=>{
    resultado.push({...m, _filhas: grupos[m.id]||[]});
  });

  // Adicionar filhas que não têm modelo na lista (modelo deletado)
  Object.keys(grupos).forEach(paiId=>{
    const temModelo = modelos.find(m=>m.id===paiId);
    if(!temModelo){
      grupos[paiId].forEach(f=>resultado.push(f));
    }
  });

  return resultado;
}

async function criarTarefasRecorrentes(){
  try{
    const hoje = new Date();
    const diaSemana = hoje.getDay(); // 0=Dom, 1=Seg...
    const hojeStr = hoje.toISOString().split('T')[0];

    // Buscar tarefas recorrentes da empresa
    const { data: recorrentes } = await sb.from('tarefas')
      .select('*')
      .eq('company_id', S.company.id)
      .eq('recorrente', true)
      .not('dias_semana', 'is', null);

    if(!recorrentes || recorrentes.length === 0) return;

    for(const t of recorrentes){
      // Verificar se hoje é um dia configurado
      if(!t.dias_semana.includes(diaSemana)) continue;

      // Verificar se já foi criada hoje (tarefa filha com mesmo título hoje)
      const { data: jaExiste } = await sb.from('tarefas')
        .select('id')
        .eq('company_id', S.company.id)
        .eq('tarefa_pai', t.id)
        .gte('created_at', hojeStr + 'T00:00:00')
        .lte('created_at', hojeStr + 'T23:59:59')
        .limit(1);

      if(jaExiste && jaExiste.length > 0) continue;

      // Criar todas as repetições do dia
      const reps = t.repeticoes_dia || 1;
      for(let rep=1; rep<=reps; rep++){
        const jaExisteRep = await sb.from('tarefas')
          .select('id')
          .eq('company_id', S.company.id)
          .eq('tarefa_pai', t.id)
          .eq('repeticao_atual', rep)
          .gte('created_at', hojeStr + 'T00:00:00')
          .lte('created_at', hojeStr + 'T23:59:59')
          .limit(1);

        if(jaExisteRep.data && jaExisteRep.data.length > 0) continue;

        // Calcular prazo desta repetição com timezone local
        const agoraRec = new Date();
        const hojeLocalRec = new Date(agoraRec.getFullYear(), agoraRec.getMonth(), agoraRec.getDate());
        let prazoRep;
        if(t.config){
          try{
            const cfg = typeof t.config === 'string' ? JSON.parse(t.config) : t.config;
            if(cfg.horarios && cfg.horarios[rep-1]){
              const [hh,mm] = cfg.horarios[rep-1].split(':').map(Number);
              const prazoLocal = new Date(
                agoraRec.getFullYear(), agoraRec.getMonth(), agoraRec.getDate(),
                hh, mm, 0, 0
              );
              prazoRep = prazoLocal.toISOString();
            } else {
              const fimDia = new Date(hojeLocalRec);

        } else {

        }

        const { data: nova } = await sb.from('tarefas').insert({

}

async function salvarTarefa(){
  const titulo = (document.getElementById('t-titulo')||{}).value&&document.getElementById('t-titulo').value.trim();
  const desc = (document.getElementById('t-desc')||{}).value&&document.getElementById('t-desc').value.trim();
  const resp = (document.getElementById('t-resp')||{}).value||null;
  const prio = (document.getElementById('t-prio')||{}).value||'normal';
  const prazo = (document.getElementById('t-prazo')||{}).value||null;
  const repeticoesDia = parseInt((document.getElementById('t-repeticoes')||{}).value)||1;
  const recorrente = (document.getElementById('t-recorrente')||{}).checked||false;
  const horaInicio = (document.getElementById('t-hora-inicio')||{}).value||'08:00';
  const horaFim = (document.getElementById('t-hora-fim')||{}).value||'18:00';

  if(!titulo){ toast('⚠️ Informe o título', false); return; }

  // Calcular horários das repetições usando hora local
  let horariosReps = null;
  if(horaInicio){
    const hI = parseInt(horaInicio.split(':')[0])*60 + parseInt(horaInicio.split(':')[1]);
    const hF = horaFim ? parseInt(horaFim.split(':')[0])*60 + parseInt(horaFim.split(':')[1]) : hI;
    horariosReps = [];
    if(repeticoesDia === 1){
      horariosReps.push(horaInicio);
    } else {
      const interval = Math.floor((hF-hI)/(repeticoesDia-1));
      for(var i=0;i<repeticoesDia;i++){
        const mins = hI+(interval*i);
        horariosReps.push(String(Math.floor(mins/60)).padStart(2,'0')+':'+String(mins%60).padStart(2,'0'));
      }
    }
  }

  // Dias da semana se recorrente
  const diasChecks = document.querySelectorAll('.dia-check:checked');
  const diasSemana = diasChecks.length>0 ? Array.from(diasChecks).map(function(c){return parseInt(c.value);}) : null;

  const payload = {
    company_id: S.company.id,
    titulo, descricao: desc||null,
    atribuido_para: resp||null,
    prioridade: prio,
    prazo: prazo ? new Date(prazo+'T23:59:59').toISOString() : null,
    criado_por: S.usuario.id,
    status: 'pendente',
    recorrente: repeticoesDia>1 ? true : recorrente,
    repeticoes_dia: repeticoesDia,
    dias_semana: diasSemana,
    config: horariosReps ? JSON.stringify({horaInicio,horaFim,horarios:horariosReps}) : null
  };

  const { data, error } = await sb.from('tarefas')
    .insert(payload)
    .select('*, atribuido_para:usuarios!tarefas_atribuido_para_fkey(nome)')
    .single();

  if(error){ toast('⚠️ Erro: '+error.message, false); return; }
  S.tarefas.unshift(data);

  // Criar filhas para hoje se tem repetições
  if(repeticoesDia > 1){
    const filhas = [];
    for(var rep=1;rep<=repeticoesDia;rep++){
      var prazoRep;
      if(horariosReps&&horariosReps[rep-1]){
        var parts = horariosReps[rep-1].split(':');
        var h = parseInt(parts[0]), m = parseInt(parts[1]);
        // Usar new Date(ano,mes,dia,h,m) para garantir hora local correta
        var now = new Date();
        var d = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0, 0);
        prazoRep = d.toISOString();
      } else {
        var now2 = new Date();
        var d2 = new Date(now2.getFullYear(), now2.getMonth(), now2.getDate(), 23, 59, 59, 0);
        prazoRep = d2.toISOString();
      }
      filhas.push({
        company_id: S.company.id, titulo, descricao:desc||null,
        atribuido_para: resp||null, prioridade: prio,
        criado_por: 'recorrente', status: 'pendente',
        prazo: prazoRep, tarefa_pai: data.id,
        recorrente: false, repeticoes_dia: repeticoesDia, repeticao_atual: rep
      });
    }
    const { data: filhasData } = await sb.from('tarefas').insert(filhas).select('*, atribuido_para:usuarios!tarefas_atribuido_para_fkey(nome)');
    if(filhasData) filhasData.forEach(function(f){S.tarefas.unshift(f);});
    await sb.from('tarefas').update({recorrente:true}).eq('id',data.id);
    data.recorrente = true;
  }

  logAuditoria('tarefa_criada','Criou tarefa: "'+titulo+'"');
  closeModal();
  toast(repeticoesDia>1?'?? Tarefa criada com '+repeticoesDia+' repetições!':'✅ Tarefa criada!');
  renderView('tarefas');
}

function renderEquipe(){

    +'<button onclick="clearChat()" style="margin-left:auto;background:none;border:1px solid var(--border2);color:var(--muted);font-size:.7rem;padding:.3rem .625rem;border-radius:6px;cursor:pointer;font-family:var(--body)">Limpar</button>'
    +'</div>'

    +msgsHtml
    +'</div>'
    +'<div style="padding:.875rem 1rem;border-top:1px solid var(--border);display:flex;gap:.625rem;background:var(--black);flex-shrink:0">'
    +'<input class="inp" id="chat-inp" placeholder="Mensagem para '+ag.nome+'..." onkeydown="if(event.keyCode===13)sendMessage()" style="flex:1">'
    +'<button onclick="sendMessage()" id="btn-send" style="width:40px;height:40px;border-radius:50%;background:var(--accent);color:var(--black);border:none;cursor:pointer;font-size:.9rem;flex-shrink:0">→</button>'
    +'</div>'
    +'</div>';

  const msgs = document.getElementById('chat-msgs');
  if(msgs) msgs.scrollTop = msgs.scrollHeight;
}

async function sendMessage(){
  const inp = document.getElementById('chat-inp');
  const msg = inp&&inp.value.trim();
  if(!msg) return;
  if(inp) inp.value='';
  
  const btn = document.getElementById('btn-send');
  if(btn) btn.disabled=true;

  chatMessages.push({role:'user', content:msg});
  renderChatView();

  const ag = AGENTS[currentAgent]||AGENTS.gestor;
  const systemPrompt = ag.prompt(S.company, S.tarefas, S.equipe, S.customers);

  try{
    const res = await fetch('https://jgerente-ai.vercel.app/api/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({messages: chatMessages.slice(-10), systemPrompt})
    });
    const data = await res.json();
    const reply = data.response||'Desculpe, não consegui processar.';
    chatMessages.push({role:'assistant', content:reply});

    // Salvar no banco
    await sb.from('conversas').insert([
      {company_id:S.company.id, agente:currentAgent, role:'user', content:msg},
      {company_id:S.company.id, agente:currentAgent, role:'assistant', content:reply}
    ]);
  }catch(e){
    chatMessages.push({role:'assistant', content:'Desculpe, ocorreu um erro. Tente novamente.'});
  }

  if(btn) btn.disabled=false;
  renderChatView();
}

async function loadChatHistory(agente){
  currentAgent = agente||'gestor';
  const { data } = await sb.from('conversas')
    .select('*')
    .eq('company_id', S.company.id)
    .eq('agente', currentAgent)
    .order('created_at', {ascending: true})
    .limit(30);
  chatMessages = (data||[]).map(function(m){ return {role:m.role, content:m.content}; });
  renderChatView();
}

async function clearChat(){
  await sb.from('conversas').delete().eq('company_id',S.company.id).eq('agente',currentAgent);
  chatMessages=[];
  renderChatView();
}

  var c = S.customers.find(function(x){ return x.id===id; });
  if(c) c.pontos = novoPts;

  closeModal();
  toast('⭐ '+pts+' pontos adicionados!');
  logAuditoria('fidelidade', 'Adicionou '+pts+' pontos para cliente');
  renderView('fidelidade');
}

function filtrarAuditLogs(){
  const logs = window._auditAllLogs||[];
  const icons = window._auditIcons||{};
  const fn = (document.getElementById('f-nome')||{}).value||'';
  const ft = (document.getElementById('f-tipo')||{}).value||'';
  const lista = document.getElementById('audit-lista');
  if(!lista) return;

  const filtrados = logs.filter(function(l){
    if(fn && l.usuario_nome !== fn) return false;
    if(ft && l.acao !== ft) return false;
    return true;
  });

  if(filtrados.length===0){
    lista.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--muted);font-size:.82rem">Nenhum registro encontrado.</div>';
    return;
  }

  lista.innerHTML = filtrados.map(function(log,i){
    const icon = icons[log.acao]||'??';
    const nome = escHtml(log.usuario_nome||'Sistema');
    const det = escHtml(log.detalhes||log.acao);
    const data = new Date(log.created_at).toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
    const hora = new Date(log.created_at).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    const border = i<filtrados.length-1?'1px solid rgba(255,255,255,.07)':'none';
    return '<div style="display:flex;align-items:flex-start;gap:.875rem;padding:1rem 1.25rem;border-bottom:'+border+'">'
      +'<div style="width:36px;height:36px;border-radius:10px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0">'+icon+'</div>'
      +'<div style="flex:1;min-width:0">'
      +'<div style="font-size:.82rem;font-weight:600">'+nome+'</div>'
      +'<div style="font-size:.78rem;color:var(--muted);margin-top:.15rem">'+det+'</div>'
      +'</div>'
      +'<div style="font-size:.7rem;color:var(--muted);white-space:nowrap;flex-shrink:0;text-align:right">'
      +'<div>'+data+'</div><div>'+hora+'</div></div></div>';
  }).join('');
}

function renderMural(){
  const membros = S.equipe.filter(function(m){ return m.perfil==='funcionario' && m.ativo!==false; });

  // Calcular performance de cada membro
  const ranking = membros.map(function(m){
    const minhasTarefas = S.tarefas.filter(function(t){ return t.atribuido_para===m.id; });
    const concluidas = minhasTarefas.filter(function(t){ return t.status==='concluida'; }).length;
    const pendentes = minhasTarefas.filter(function(t){ return t.status==='pendente'; }).length;
    const total = minhasTarefas.length;
    const taxa = total > 0 ? Math.round((concluidas/total)*100) : 0;

    // Presença essa semana
    const semanaAtras = new Date(Date.now() - 7*24*60*60*1000).toISOString();
    const presencaSemana = (S.presencas||[]).filter(function(p){
      return p.usuario_id===m.id && p.tipo==='entrada' && p.created_at >= semanaAtras;
    }).length;

    // Score do funcionário
    var score = 0;
    score += Math.min(50, taxa * 0.5); // até 50 pts por taxa de conclusão
    score += Math.min(30, presencaSemana * 6); // até 30 pts por presença (5 dias = 30)
    score += Math.min(20, concluidas * 2); // até 20 pts por volume

    return { ...m, concluidas, pendentes, total, taxa, presencaSemana, score: Math.round(score) };
  }).sort(function(a,b){ return b.score - a.score; });

  const medalhas = ['??','??','??'];
  const corScore = function(s){ return s>=80?'var(--accent)':s>=60?'var(--warning)':s>=40?'rgba(255,149,0,1)':'var(--error)'; };

  var html = '<div class="main-header">'
    +'<div><div class="page-title">?? Mural da Equipe</div>'
    +'<div class="page-sub">Ranking de performance da semana</div></div>'
    +'</div>'
    +'<div class="content">';

  if(ranking.length === 0){
    html += '<div style="text-align:center;padding:3rem;color:var(--muted)">'
      +'<div style="font-size:2.5rem;margin-bottom:.75rem">??</div>'
      +'<div>Nenhum funcionário cadastrado ainda.</div></div>';
  } else {
    // Top 3 podium
    if(ranking.length >= 3){
      html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem;margin-bottom:1.25rem;text-align:center">';
      [ranking[1], ranking[0], ranking[2]].forEach(function(m, i){
        var posOriginal = i===1 ? 0 : i===0 ? 1 : 2;
        var altura = i===1 ? '120px' : '90px';
        html += '<div style="background:var(--card);border:1px solid '+(posOriginal===0?'rgba(255,214,0,.3)':'var(--border)')+';border-radius:16px;padding:1rem .5rem">'
          +'<div style="font-size:'+(posOriginal===0?'2.5rem':'1.75rem')+'">'+medalhas[posOriginal]+'</div>'
          +'<div style="font-size:1.75rem;margin:.25rem 0">'+avColor(m.nome)+'</div>'
          +'<div style="font-family:var(--font);font-size:.7rem;font-weight:700;margin-bottom:.25rem">'+escHtml(m.nome.split(' ')[0])+'</div>'
          +'<div style="font-family:var(--font);font-size:1rem;font-weight:900;color:'+corScore(m.score)+'">'+m.score+'</div>'
          +'<div style="font-size:.65rem;color:var(--muted)">pts</div>'
          +'</div>';
      });
      html += '</div>';
    }

    // Full ranking list
    html += '<div style="background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden">'
      +'<div style="padding:.875rem 1.25rem;border-bottom:1px solid var(--border);font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">Ranking completo</div>';

    ranking.forEach(function(m, idx){
      var posEmoji = idx < 3 ? medalhas[idx] : (idx+1)+'°';
      var barW = Math.min(100, m.score);
      html += '<div style="padding:.875rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.875rem">'
        +'<div style="font-family:var(--font);font-size:.8rem;font-weight:900;min-width:28px;text-align:center">'+posEmoji+'</div>'
        +'<div style="font-size:1.5rem">'+avColor(m.nome)+'</div>'
        +'<div style="flex:1;min-width:0">'
        +'<div style="font-size:.82rem;font-weight:700;margin-bottom:.25rem">'+escHtml(m.nome)+'</div>'
        +'<div style="height:4px;background:var(--border);border-radius:100px;overflow:hidden;margin-bottom:.2rem">'
        +'<div style="height:100%;width:'+barW+'%;background:'+corScore(m.score)+';border-radius:100px"></div>'
        +'</div>'
        +'<div style="display:flex;gap:.875rem;font-size:.68rem;color:var(--muted)">'
        +'<span>✅ '+m.concluidas+' concluídas</span>'
        +'<span>?? '+m.total+' tarefas</span>'
        +'<span>?? '+m.presencaSemana+'x presença</span>'
        +'</div>'
        +'</div>'
        +'<div style="text-align:right;flex-shrink:0">'
        +'<div style="font-family:var(--font);font-size:1.1rem;font-weight:900;color:'+corScore(m.score)+'">'+m.score+'</div>'
        +'<div style="font-size:.65rem;color:var(--muted)">pontos</div>'
        +'</div>'
        +'</div>';
    });

    html += '</div>';

    // Legenda pontuação
    html += '<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem;margin-top:.875rem">'
      +'<div style="font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.625rem">Como é calculado</div>'
      +'<div style="display:flex;flex-direction:column;gap:.375rem;font-size:.75rem;color:var(--muted)">'
      +'<div>✅ Até <b style="color:var(--white)">50 pontos</b> por taxa de tarefas concluídas</div>'
      +'<div>?? Até <b style="color:var(--white)">30 pontos</b> por presença na semana</div>'
      +'<div>?? Até <b style="color:var(--white)">20 pontos</b> por volume de trabalho</div>'
      +'</div></div>';
  }

  html += '</div>';
  return html;
}

function afterRenderContabilidade(){
  var msgs = document.getElementById('contab-msgs');
  if(msgs) msgs.scrollTop = msgs.scrollHeight;
}

async function sendContab(txt){
  if(contabBusy) return;
  var inp = document.getElementById('contab-inp');
  var msg = txt || (inp&&inp.value.trim());
  if(!msg) return;
  if(inp){ inp.value=''; inp.style.height='auto'; }

  contabMsgs.push({role:'user', content:msg});
  contabBusy = true;

  var sendBtn = document.getElementById('contab-send');
  if(sendBtn) sendBtn.disabled = true;

  contabMsgs.push({role:'system', content:'Consultando especialista...'});
  renderContabilidade();

  try{
    var systemPrompt = 'Você é um especialista em contabilidade brasileira com 20 anos de experiência.'
      +' Empresa do cliente: "'+escHtml(S.company&&S.company.nome||'empresa')+'".'
      +' Você domina: MEI, Simples Nacional, Lucro Presumido, Lucro Real, folha de pagamento, eSocial,'
      +' SPED, DCTF, EFD-Contribuições, IRPJ, CSLL, PIS, COFINS, ICMS, ISS, INSS, FGTS, DAS.'
      +' Responda sempre em português, de forma clara e direta para o empresário leigo.'
      +' Quando necessário, recomende falar com um contador para casos específicos.'
      +' Use formatação com tópicos quando a resposta for longa. Seja preciso com datas e valores atuais de 2026.';

    var res = await fetch('https://jgerente-ai.vercel.app/api/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        messages: contabMsgs.filter(function(m){ return m.role==='user'||m.role==='assistant'; }).slice(-10),
        systemPrompt: systemPrompt
      })
    });
    var data = await res.json();
    var reply = data.response || 'Erro ao processar.';

    contabMsgs = contabMsgs.filter(function(m){ return m.content!=='Consultando especialista...'; });
    contabMsgs.push({role:'assistant', content:reply});

  }catch(e){
    contabMsgs = contabMsgs.filter(function(m){ return m.content!=='Consultando especialista...'; });
    contabMsgs.push({role:'assistant', content:'Erro ao conectar. Tente novamente.'});
  }

  contabBusy = false;
  renderView('contabilidade');
  afterRenderContabilidade();
}
