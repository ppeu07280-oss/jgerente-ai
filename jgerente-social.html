<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JgerenteAI — Social Mídia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;900&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#050508;--white:#F5F3EE;--accent:#00FF88;
  --muted:#8B8B99;--card:#0D0D14;--card2:#111118;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --font:'Unbounded',sans-serif;--body:'DM Sans',sans-serif;
  --pink:#FF6B9D;--purple:#9D6BFF;--error:#FF3D6B;
}
html,body{min-height:100vh;background:var(--black);color:var(--white);font-family:var(--body)}

/* LOGIN */
#login-screen{position:fixed;inset:0;z-index:999;background:var(--black);display:flex;align-items:center;justify-content:center;padding:1.5rem}
.login-box{width:100%;max-width:380px;background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:2rem}
.login-logo{font-family:var(--font);font-weight:900;font-size:1rem;margin-bottom:1.5rem;text-align:center}
.login-logo .j{color:var(--accent)}
.inp{width:100%;padding:.8rem 1rem;background:var(--card2);border:1.5px solid var(--border2);border-radius:10px;font-size:.9rem;color:var(--white);font-family:var(--body);outline:none;transition:border-color .2s;margin-bottom:.875rem}
.inp:focus{border-color:var(--accent)}
.btn-login{width:100%;padding:.875rem;background:linear-gradient(135deg,var(--pink),var(--purple));color:var(--white);border:none;border-radius:10px;font-family:var(--font);font-size:.82rem;font-weight:700;cursor:pointer}
.login-err{font-size:.75rem;color:var(--error);margin-top:.5rem;text-align:center;min-height:18px}

/* APP */
#app{display:none;flex-direction:column;min-height:100vh}
#app.show{display:flex}

/* HEADER */
.header{background:var(--card);border-bottom:1px solid var(--border);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-logo{font-family:var(--font);font-size:.85rem;font-weight:900}
.header-logo .j{color:var(--accent)}
.header-sub{font-size:.72rem;color:var(--muted)}
.btn-back{background:none;border:1px solid var(--border2);color:var(--muted);font-family:var(--body);font-size:.72rem;padding:.4rem .75rem;border-radius:8px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:.375rem}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--card);overflow-x:auto;scrollbar-width:none}
.tab-btn{flex-shrink:0;padding:.875rem 1.125rem;font-size:.72rem;font-weight:600;color:var(--muted);background:none;border:none;cursor:pointer;font-family:var(--body);border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

/* CONTENT */
.content{padding:1.25rem;flex:1;max-width:900px;margin:0 auto;width:100%}

/* CHAT */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 115px)}
.chat-msgs{flex:1;overflow-y:auto;padding:1.25rem;display:flex;flex-direction:column;gap:.875rem}
.chat-msg{display:flex;gap:.625rem;max-width:90%}
.chat-msg.user{align-self:flex-end;flex-direction:row-reverse}
.chat-bubble{padding:.75rem 1rem;border-radius:14px;font-size:.83rem;line-height:1.6}
.chat-msg.user .chat-bubble{background:linear-gradient(135deg,var(--pink),var(--purple));color:var(--white);border-radius:14px 14px 4px 14px}
.chat-msg.ai .chat-bubble{background:var(--card2);border:1px solid var(--border);border-radius:14px 14px 14px 4px}
.chat-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0;margin-top:.2rem;background:var(--card2);border:1px solid var(--border)}

/* IMAGE IN CHAT */
.img-msg{max-width:320px}
.img-msg img{width:100%;border-radius:10px;display:block;margin-bottom:.5rem}
.img-actions{display:flex;gap:.375rem}
.img-btn{flex:1;padding:.5rem;border-radius:8px;font-size:.72rem;font-weight:700;cursor:pointer;font-family:var(--body);border:none;text-align:center;text-decoration:none;display:block}
.img-btn.download{background:linear-gradient(135deg,var(--pink),var(--purple));color:white}
.img-btn.regen{background:var(--card);border:1px solid var(--border2);color:var(--muted)}

/* INPUT AREA */
.chat-input-wrap{padding:.875rem 1rem;border-top:1px solid var(--border);background:var(--black);flex-shrink:0}

/* REFERENCE PHOTO */
.ref-area{margin-bottom:.625rem}
.ref-label{font-size:.7rem;color:var(--muted);margin-bottom:.375rem;display:flex;align-items:center;justify-content:space-between}
.ref-preview{display:flex;align-items:center;gap:.625rem;padding:.5rem .75rem;background:var(--card2);border:1px solid var(--border2);border-radius:8px;margin-bottom:.5rem}
.ref-thumb{width:36px;height:36px;border-radius:6px;object-fit:cover}
.ref-name{font-size:.72rem;color:var(--muted);flex:1}
.ref-remove{background:none;border:none;color:var(--error);cursor:pointer;font-size:.85rem;padding:.25rem}
.upload-btn{padding:.375rem .75rem;background:rgba(255,107,157,.08);border:1px solid rgba(255,107,157,.2);color:var(--pink);border-radius:8px;font-size:.7rem;font-weight:600;cursor:pointer;font-family:var(--body)}

/* QUICK ACTIONS */
.quick-wrap{display:flex;gap:.375rem;flex-wrap:wrap;margin-bottom:.625rem}
.quick-btn{padding:.3rem .75rem;background:var(--card2);border:1px solid var(--border2);color:var(--muted);font-size:.7rem;border-radius:100px;cursor:pointer;font-family:var(--body);transition:all .15s;white-space:nowrap}
.quick-btn:hover{border-color:var(--pink);color:var(--pink)}
.quick-btn.img{border-color:rgba(255,107,157,.3);color:var(--pink)}

/* INPUT ROW */
.input-row{display:flex;gap:.5rem}
.chat-inp{flex:1;padding:.75rem 1rem;background:var(--card2);border:1.5px solid var(--border2);border-radius:12px;font-size:.85rem;color:var(--white);font-family:var(--body);outline:none;resize:none}
.chat-inp:focus{border-color:var(--accent)}
.btn-send{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--purple));color:var(--white);border:none;cursor:pointer;font-size:.9rem;flex-shrink:0}
.btn-send:disabled{opacity:.4;cursor:not-allowed}

/* TYPING */
.typing{display:flex;gap:4px;align-items:center;padding:.375rem}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:bounce .8s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

/* CALENDÁRIO */
.cal-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.25rem;margin-bottom:.875rem}
.cal-day{font-size:.72rem;font-weight:700;color:var(--accent);margin-bottom:.5rem}
.cal-content{font-size:.82rem;line-height:1.6;color:var(--muted)}

/* TOAST */
.toast{position:fixed;top:1rem;right:1rem;z-index:9999;background:var(--card2);border:1px solid var(--border2);padding:.75rem 1.25rem;border-radius:12px;font-size:.8rem;font-weight:600;display:none;max-width:280px}
.toast.show{display:block}

/* EMPTY */
.chat-empty{text-align:center;padding:2rem;color:var(--muted)}
.chat-empty-icon{font-size:2.5rem;margin-bottom:.75rem}
.chat-empty-title{font-size:.9rem;font-weight:700;color:var(--white);margin-bottom:.5rem}
.chat-empty-sub{font-size:.78rem;line-height:1.6;margin-bottom:1.5rem}
.quick-start{display:flex;flex-direction:column;gap:.5rem;max-width:320px;margin:0 auto}
.qs-btn{padding:.75rem 1rem;background:var(--card2);border:1px solid var(--border2);color:var(--white);border-radius:10px;cursor:pointer;font-size:.8rem;font-family:var(--body);text-align:left;transition:all .2s}
.qs-btn:hover{border-color:var(--pink);color:var(--pink)}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo"><span class="j">J</span>gerenteAI · Social Mídia</div>
    <input class="inp" id="l-email" type="email" placeholder="seu@email.com">
    <input class="inp" id="l-pwd" type="password" placeholder="••••••••" onkeydown="if(event.keyCode===13)doLogin()">
    <button class="btn-login" onclick="doLogin()">Entrar →</button>
    <div class="login-err" id="l-err"></div>
  </div>
</div>

<div id="app">
  <div class="header">
    <div>
      <div class="header-logo"><span class="j">J</span>gerenteAI · 📱 Social Mídia</div>
      <div class="header-sub" id="h-company">Carregando...</div>
    </div>
    <div style="display:flex;gap:.5rem;align-items:center">
      <a href="jgerente-app.html" class="btn-back">← Painel</a>
      <button onclick="doLogout()" class="btn-back">Sair</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('agente')">🤖 Agente IA</button>
    <button class="tab-btn" onclick="showTab('calendario')">📅 Calendário</button>
  </div>

  <div id="content" style="flex:1;display:flex;flex-direction:column;overflow:hidden"></div>
</div>

<input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleFileUpload(event)">
<div class="toast" id="toast"></div>

<script>
const { createClient } = supabase;
const sb = createClient(
  'https://hnculphposmgfvaeliiw.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhuY3VscGhwb3NtZ2Z2YWVsaWl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MTE4MDIsImV4cCI6MjA5MDM4NzgwMn0.mlkDEf0HI6XQm2mX7Ee3CWcR8WxevJiy3l2xBdvTaNM'
);

const CHAT_URL = 'https://jgerente-ai.vercel.app/api/chat';
const GEMINI_URL = 'https://jgerente-ai.vercel.app/api/chat';

let S = { usuario: null, company: null };
let chatMsgs = [];
let refImage = null; // { base64, name, mimeType }
let isGenerating = false;
let toastTimer;

function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toast(msg, ok=true){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.color = ok ? 'var(--accent)' : 'var(--error)';
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ el.classList.remove('show'); }, 3000);
}

async function doLogin(){
  const email = document.getElementById('l-email').value.trim();
  const pwd = document.getElementById('l-pwd').value;
  const err = document.getElementById('l-err');
  if(!email||!pwd){ err.textContent='⚠️ Preencha email e senha'; return; }
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pwd });
  if(error){ err.textContent='❌ Email ou senha incorretos'; return; }
  await initApp(data.user);
}

async function doLogout(){
  await sb.auth.signOut();
  window.location.href = 'jgerente-app.html';
}

async function initApp(user){
  try{
    const { data: usr } = await sb.from('usuarios').select('*').eq('auth_id', user.id).single();
    S.usuario = usr;
    const { data: comp } = await sb.from('companies').select('*').eq('id', usr.company_id).single();
    S.company = comp;
    document.getElementById('h-company').textContent = comp&&comp.nome||'';
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').classList.add('show');
    showTab('agente');
  }catch(e){
    document.getElementById('l-err').textContent='⚠️ Erro. Tente novamente.';
  }
}

// ── TABS ──
function showTab(tab){
  document.querySelectorAll('.tab-btn').forEach(function(b,i){
    b.classList.toggle('active', ['agente','calendario'][i]===tab);
  });
  const el = document.getElementById('content');
  el.style.padding = tab==='agente' ? '0' : '1.25rem';
  el.style.overflow = tab==='agente' ? 'hidden' : 'auto';
  if(tab==='agente') renderAgente();
  else renderCalendario();
}

// ── AGENTE ──
function renderAgente(){
  const el = document.getElementById('content');

  const msgsHtml = chatMsgs.length === 0
    ? '<div class="chat-empty">'
      +'<div class="chat-empty-icon">📱</div>'
      +'<div class="chat-empty-title">Agente Social Mídia</div>'
      +'<div class="chat-empty-sub">Descreva o que precisa. Posso criar legendas,<br>roteiros e gerar imagens para seus posts.</div>'
      +'<div class="quick-start">'
      +'<button class="qs-btn" onclick="enviar(\'Crie um post completo para Instagram sobre meu negócio hoje\')">📝 Post completo para hoje</button>'
      +'<button class="qs-btn" onclick="enviar(\'Gere uma imagem profissional do meu produto para Instagram\')">🖼️ Gerar imagem do produto</button>'
      +'<button class="qs-btn" onclick="enviar(\'Crie um roteiro de 30 segundos para Reels\')">🎬 Roteiro para Reels</button>'
      +'<button class="qs-btn" onclick="enviar(\'Sugira 10 hashtags para meu segmento\')">🏷️ Hashtags estratégicas</button>'
      +'</div></div>'
    : chatMsgs.map(renderMsgHtml).join('');

  el.innerHTML = '<div class="chat-wrap">'
    +'<div class="chat-msgs" id="chat-msgs">'+msgsHtml+'</div>'
    +'<div class="chat-input-wrap">'
    // Reference photo area
    +'<div class="ref-area">'
    +(refImage
      ? '<div class="ref-preview"><img class="ref-thumb" src="'+refImage.base64+'"><span class="ref-name">📎 '+escHtml(refImage.name)+'</span><button class="ref-remove" onclick="removeRef()">✕</button></div>'
      : ''
    )
    +'<div class="ref-label">'
    +'<span style="color:var(--muted);font-size:.7rem">📎 Foto de referência do produto (opcional)</span>'
    +'<button class="upload-btn" onclick="document.getElementById(\'file-input\').click()">+ Subir foto</button>'
    +'</div>'
    +'</div>'
    // Quick buttons
    +'<div class="quick-wrap">'
    +'<button class="quick-btn img" onclick="enviar(\'Gere uma imagem profissional para post\')">🖼️ Gerar imagem</button>'
    +'<button class="quick-btn" onclick="enviar(\'Crie uma legenda criativa para hoje\')">💬 Legenda</button>'
    +'<button class="quick-btn" onclick="enviar(\'Roteiro para Reels 30s\')">🎬 Reels</button>'
    +'<button class="quick-btn" onclick="enviar(\'Hashtags para meu nicho\')">🏷️ Hashtags</button>'
    +'<button class="quick-btn" onclick="enviar(\'Texto para anúncio no Facebook\')">📣 Anúncio</button>'
    +'</div>'
    // Input row
    +'<div class="input-row">'
    +'<textarea class="chat-inp" id="chat-inp" placeholder="Descreva o que precisa para suas redes sociais..." rows="2" onkeydown="if(event.keyCode===13&&!event.shiftKey){event.preventDefault();enviar()}"></textarea>'
    +'<button class="btn-send" id="btn-send" onclick="enviar()" '+(isGenerating?'disabled':'')+'">→</button>'
    +'</div>'
    +'</div></div>';

  const msgs = document.getElementById('chat-msgs');
  if(msgs) msgs.scrollTop = msgs.scrollHeight;
}

function renderMsgHtml(m){
  if(m.role === 'image'){
    return '<div class="chat-msg ai"><div class="chat-av">🖼️</div>'
      +'<div class="chat-bubble img-msg">'
      +'<img src="'+m.content+'" alt="Imagem gerada">'
      +'<div class="img-actions">'
      +'<a href="'+m.content+'" download="post.jpg" class="img-btn download">⬇️ Baixar</a>'
      +'<button class="img-btn regen" onclick="regenar(\''+escHtml(m.prompt||'')+'\')">🔄 Gerar outra</button>'
      +'</div></div></div>';
  }
  if(m.role === 'system'){
    return '<div style="text-align:center;color:var(--muted);font-size:.75rem;padding:.375rem">'+escHtml(m.content)+'</div>';
  }
  var isUser = m.role === 'user';
  return '<div class="chat-msg '+(isUser?'user':'ai')+'">'
    +'<div class="chat-av">'+(isUser?'👤':'📱')+'</div>'
    +'<div class="chat-bubble">'+renderMd(m.content)+'</div>'
    +'</div>';
}

function renderMd(text){
  if(!text) return '';
  var t = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  var lines = t.split('\n');
  var result = lines.map(function(line){
    if(line.startsWith('### ')) return '<div style="font-weight:700;margin:.5rem 0 .2rem">'+line.slice(4)+'</div>';
    if(line.startsWith('## ')) return '<div style="font-weight:700;font-size:.9rem;margin:.625rem 0 .25rem">'+line.slice(3)+'</div>';
    if(line.startsWith('* ')||line.startsWith('- ')) return '<div style="padding-left:.75rem;margin:.15rem 0">&bull; '+line.slice(2)+'</div>';
    var nm = line.match(/^(\d+)\. (.+)$/);
    if(nm) return '<div style="padding-left:.75rem;margin:.15rem 0"><b>'+nm[1]+'.</b> '+nm[2]+'</div>';
    if(line==='---') return '<hr style="border:none;border-top:1px solid rgba(255,255,255,.1);margin:.5rem 0">';
    return line ? '<div>'+line+'</div>' : '<div style="height:.4rem"></div>';
  }).join('');
  return result.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/\*(.+?)\*/g,'<i>$1</i>');
}

// ── FILE UPLOAD ──
function handleFileUpload(event){
  const file = event.target.files[0];
  if(!file) return;
  if(file.size > 5*1024*1024){ toast('⚠️ Imagem muito grande (máx 5MB)', false); return; }

  const reader = new FileReader();
  reader.onload = function(e){
    refImage = {
      base64: e.target.result,
      name: file.name,
      mimeType: file.type,
      data: e.target.result.split(',')[1]
    };
    renderAgente();
    toast('📎 Foto de referência adicionada!');
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

function removeRef(){
  refImage = null;
  renderAgente();
}

// ── ENVIAR MENSAGEM ──
async function enviar(txt){
  if(isGenerating) return;
  const inp = document.getElementById('chat-inp');
  const msg = txt || (inp&&inp.value.trim());
  if(!msg) return;
  if(inp) inp.value = '';

  isGenerating = true;
  chatMsgs.push({role:'user', content:msg});

  // Detectar pedido de imagem
  var msgL = msg.toLowerCase();
  var isImg = msgL.includes('gere uma imagem') || msgL.includes('gerar imagem')
    || msgL.includes('crie uma imagem') || msgL.includes('criar imagem')
    || msgL.includes('gera uma imagem') || msgL.includes('imagem para post')
    || msgL.includes('foto para') || msgL.includes('imagem profissional')
    || (msgL.includes('imagem') && (msgL.includes('gere')||msgL.includes('crie')||msgL.includes('gera')));

  var systemPrompt = 'Você é o Agente Social Mídia da empresa "'+( S.company&&S.company.nome||'empresa')+'".'
    +' Especialista em marketing digital brasileiro. Cria legendas virais, roteiros para Reels/TikTok, hashtags estratégicas.'
    +' Fala de forma jovem, engajante e usa emojis. Responda em português!'
    +(isImg ? ' O usuário quer uma imagem. Primeiro crie um prompt detalhado em inglês para geração de imagem com IA, depois escreva uma legenda em português para acompanhar o post.' : '');

  // Mostrar loading
  chatMsgs.push({role:'system', content:'digitando...'});
  renderAgente();

  try{
    // 1. Obter resposta do chat
    const chatRes = await fetch(CHAT_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({messages: chatMsgs.filter(function(m){return m.role==='user'||m.role==='assistant';}).slice(-8), systemPrompt})
    });
    const chatData = await chatRes.json();
    const reply = chatData.response || 'Erro ao processar.';

    // Remover loading
    chatMsgs = chatMsgs.filter(function(m){ return m.content !== 'digitando...'; });
    chatMsgs.push({role:'assistant', content:reply});

    // 2. Se pediu imagem, gerar
    if(isImg){
      chatMsgs.push({role:'system', content:'🎨 Gerando sua imagem...'});
      renderAgente();

      try{
        // Extrair prompt em inglês da resposta ou usar a mensagem original
        var imgPrompt = reply;
        // Se a resposta tem legenda em português junto, pega só a primeira parte (prompt em inglês)
        var lines = reply.split('\n').filter(function(l){ return l.trim(); });
        var englishLine = lines.find(function(l){
          return /[a-z]{3,}/i.test(l) && l.length > 20 && !l.includes('emoji') && !l.includes('hashtag');
        });
        if(englishLine) imgPrompt = englishLine;

        var imgPayload = {
          generateImage: true,
          imagePrompt: imgPrompt + (refImage ? ' Match the style and colors of the reference image.' : ''),
          aspectRatio: '1:1'
        };

        // Adicionar imagem de referência se existir
        if(refImage){
          imgPayload.referenceImage = refImage.data;
          imgPayload.referenceMimeType = refImage.mimeType;
        }

        const imgRes = await fetch(CHAT_URL, {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify(imgPayload)
        });
        const imgData = await imgRes.json();

        chatMsgs = chatMsgs.filter(function(m){ return m.content !== '🎨 Gerando sua imagem...'; });

        if(imgData.imageUrl){
          chatMsgs.push({role:'image', content:imgData.imageUrl, prompt:imgPrompt});
          toast('✅ Imagem gerada!');
        } else {
          chatMsgs.push({role:'assistant', content:'⚠️ Não consegui gerar a imagem. Tente descrever diferente ou subir uma foto de referência.'});
        }
      }catch(imgErr){
        chatMsgs = chatMsgs.filter(function(m){ return m.content !== '🎨 Gerando sua imagem...'; });
        chatMsgs.push({role:'assistant', content:'⚠️ Erro ao gerar imagem. Tente novamente.'});
      }
    }
  }catch(e){
    chatMsgs = chatMsgs.filter(function(m){ return m.content !== 'digitando...'; });
    chatMsgs.push({role:'assistant', content:'Erro ao conectar. Tente novamente.'});
  }

  isGenerating = false;
  renderAgente();
}

async function regenar(prompt){
  if(!prompt || isGenerating) return;
  isGenerating = true;
  chatMsgs.push({role:'system', content:'🎨 Gerando nova versão...'});
  renderAgente();

  try{
    const imgRes = await fetch(CHAT_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({generateImage:true, imagePrompt:prompt, aspectRatio:'1:1'})
    });
    const imgData = await imgRes.json();
    chatMsgs = chatMsgs.filter(function(m){ return m.content !== '🎨 Gerando nova versão...'; });
    if(imgData.imageUrl){
      chatMsgs.push({role:'image', content:imgData.imageUrl, prompt:prompt});
    }
  }catch(e){
    chatMsgs = chatMsgs.filter(function(m){ return m.content !== '🎨 Gerando nova versão...'; });
  }

  isGenerating = false;
  renderAgente();
}

// ── CALENDÁRIO ──
async function renderCalendario(){
  const el = document.getElementById('content');
  el.innerHTML = '<div style="padding:1.25rem">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem">'
    +'<div><div style="font-family:var(--font);font-size:.9rem;font-weight:700">📅 Calendário de Conteúdo</div>'
    +'<div style="font-size:.75rem;color:var(--muted);margin-top:.25rem">Plano semanal gerado por IA</div></div>'
    +'<button onclick="gerarCalendario()" style="padding:.625rem 1rem;background:linear-gradient(135deg,var(--pink),var(--purple));color:white;border:none;border-radius:10px;font-family:var(--font);font-size:.72rem;font-weight:700;cursor:pointer">✨ Gerar semana</button>'
    +'</div>'
    +'<div id="cal-content"><div style="text-align:center;padding:3rem;color:var(--muted);font-size:.82rem">Clique em "Gerar semana" para criar seu calendário de conteúdo personalizado.</div></div>'
    +'</div>';
}

async function gerarCalendario(){
  const btn = document.querySelector('button[onclick="gerarCalendario()"]');
  if(btn){ btn.disabled=true; btn.textContent='⏳ Gerando...'; }

  const prompt = 'Crie um calendário de conteúdo para redes sociais para a empresa "'+( S.company&&S.company.nome||'empresa')+'" para os próximos 7 dias.'
    +' Para cada dia inclua: tipo de post (Feed/Stories/Reels), tema, legenda pronta com emojis e hashtags relevantes.'
    +' Use linguagem jovem e brasileira. Formato: **Dia 1 - Segunda** seguido do conteúdo.';

  try{
    const res = await fetch(CHAT_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        messages:[{role:'user',content:prompt}],
        systemPrompt:'Você é especialista em marketing digital para pequenas empresas brasileiras. Crie conteúdo criativo e engajante.'
      })
    });
    const data = await res.json();
    const reply = data.response || '';

    const calEl = document.getElementById('cal-content');
    if(calEl){
      calEl.innerHTML = '<div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.25rem">'
        +'<div style="font-size:.82rem;line-height:1.8">'+renderMd(reply)+'</div>'
        +'<button onclick="copiarCal(this)" data-texto="'+escHtml(reply)+'" style="width:100%;margin-top:1rem;padding:.75rem;background:var(--card2);border:1px solid var(--border2);color:var(--white);border-radius:10px;font-size:.78rem;font-weight:600;cursor:pointer;font-family:var(--body)">📋 Copiar calendário</button>'
        +'</div>';
    }
  }catch(e){
    toast('⚠️ Erro ao gerar calendário', false);
  }

  if(btn){ btn.disabled=false; btn.textContent='✨ Gerar semana'; }
}

function copiarCal(btn){
  navigator.clipboard.writeText(btn.getAttribute('data-texto')||'').then(function(){
    toast('📋 Copiado!');
  });
}

  const { data } = await sb.auth.getSession();
  if(data&&data.session&&data.session.user) await initApp(data.session.user);
})();
