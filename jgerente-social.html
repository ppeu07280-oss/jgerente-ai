<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JgerenteAI — Financeiro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;900&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#050508;--white:#F5F3EE;--accent:#00FF88;
  --muted:#8B8B99;--card:#0D0D14;--card2:#111118;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.1);
  --font:'Unbounded',sans-serif;--body:'DM Sans',sans-serif;
  --error:#FF3D6B;--warning:#FFD600;--r:12px;
  --entrada:#00FF88;--saida:#FF3D6B;
}
html,body{min-height:100vh}
body{font-family:var(--body);background:var(--black);color:var(--white)}

/* LOGIN */
#login-screen{position:fixed;inset:0;z-index:999;background:var(--black);display:flex;align-items:center;justify-content:center;padding:1.5rem}
.login-box{width:100%;max-width:380px;background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:2rem}
.login-logo{font-family:var(--font);font-weight:900;font-size:1rem;letter-spacing:-.02em;margin-bottom:1.5rem;text-align:center}
.login-logo .j{color:var(--accent)}
.lbl{display:block;font-size:.68rem;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:.375rem}
.inp{width:100%;padding:.8rem 1rem;background:var(--card2);border:1.5px solid var(--border2);border-radius:var(--r);font-size:.9rem;color:var(--white);font-family:var(--body);outline:none;transition:border-color .2s}
.inp::placeholder{color:var(--muted)}
.inp:focus{border-color:var(--accent)}
.fg{margin-bottom:1rem}
.btn-login{width:100%;padding:.875rem;background:var(--accent);color:var(--black);border:none;border-radius:var(--r);font-family:var(--font);font-size:.82rem;font-weight:700;cursor:pointer;margin-top:.25rem}
.login-err{font-size:.75rem;color:var(--error);margin-top:.625rem;text-align:center;min-height:18px}

/* APP */
#app{display:none;min-height:100vh;flex-direction:column}
#app.show{display:flex}

/* HEADER */
.app-header{
  background:var(--card);border-bottom:1px solid var(--border);
  padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.header-left{display:flex;align-items:center;gap:1rem}
.header-logo{font-family:var(--font);font-size:.85rem;font-weight:900}
.header-logo .j{color:var(--accent)}
.header-company{font-size:.75rem;color:var(--muted)}
.btn-back{background:none;border:1px solid var(--border2);color:var(--muted);font-family:var(--body);font-size:.72rem;padding:.4rem .75rem;border-radius:8px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:.375rem}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--card);overflow-x:auto;scrollbar-width:none}
.tab-btn{flex-shrink:0;padding:.875rem 1.25rem;font-size:.75rem;font-weight:600;color:var(--muted);background:none;border:none;cursor:pointer;font-family:var(--body);border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

/* CONTENT */
.content{padding:1.25rem;flex:1;max-width:900px;margin:0 auto;width:100%}

/* CARDS */
.cards-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.75rem;margin-bottom:1.25rem}
@media(min-width:600px){.cards-grid{grid-template-columns:repeat(4,1fr)}}
.metric-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1rem;position:relative;overflow:hidden}
.metric-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.metric-card.green::before{background:var(--accent)}
.metric-card.red::before{background:var(--error)}
.metric-card.blue::before{background:#3D6BFF}
.metric-card.yellow::before{background:var(--warning)}
.metric-label{font-size:.65rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.375rem}
.metric-val{font-family:var(--font);font-size:1.4rem;font-weight:900;letter-spacing:-.04em;line-height:1}
.metric-sub{font-size:.68rem;color:var(--muted);margin-top:.25rem}

/* CHART */
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.25rem;margin-bottom:1.25rem}
.chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.chart-title{font-size:.8rem;font-weight:700;letter-spacing:.02em}
.chart-period{display:flex;gap:.375rem}
.period-btn{padding:.3rem .625rem;border-radius:6px;font-size:.65rem;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:none;color:var(--muted);font-family:var(--body);transition:all .15s}
.period-btn.active{background:var(--accent-dim,rgba(0,255,136,.08));border-color:rgba(0,255,136,.2);color:var(--accent)}

/* LANÇAMENTO */
.lanc-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.25rem;margin-bottom:1.25rem}
.lanc-tipo{display:flex;gap:.5rem;margin-bottom:1rem}
.tipo-btn{flex:1;padding:.75rem;border-radius:10px;font-size:.8rem;font-weight:700;cursor:pointer;border:1.5px solid var(--border2);background:none;color:var(--muted);font-family:var(--body);transition:all .15s}
.tipo-btn.entrada.active{border-color:var(--accent);background:rgba(0,255,136,.08);color:var(--accent)}
.tipo-btn.saida.active{border-color:var(--error);background:rgba(255,61,107,.08);color:var(--error)}
.sugestoes{display:flex;flex-wrap:wrap;gap:.375rem;margin-top:.375rem}
.sugestao-chip{padding:.25rem .625rem;background:var(--card2);border:1px solid var(--border2);border-radius:100px;font-size:.7rem;color:var(--muted);cursor:pointer;transition:all .15s}
.sugestao-chip:hover{border-color:var(--accent);color:var(--accent)}
.btn-lancar{width:100%;padding:.875rem;background:var(--accent);color:var(--black);border:none;border-radius:var(--r);font-family:var(--font);font-size:.82rem;font-weight:700;cursor:pointer;margin-top:.875rem;transition:all .2s}
.btn-lancar:hover{opacity:.9}
.btn-lancar:disabled{opacity:.5;cursor:not-allowed}

/* LISTA */
.lanc-row{display:flex;align-items:center;gap:.875rem;padding:.875rem 0;border-bottom:1px solid var(--border)}
.lanc-row:last-child{border-bottom:none}
.lanc-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0}
.lanc-info{flex:1;min-width:0}
.lanc-desc{font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lanc-cat{font-size:.7rem;color:var(--muted)}
.lanc-val{font-family:var(--font);font-size:.9rem;font-weight:800;letter-spacing:-.02em;white-space:nowrap}

/* CHAT IA */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 160px);min-height:400px}
.chat-msgs{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.875rem}
.chat-msg{display:flex;gap:.625rem;max-width:85%}
.chat-msg.user{align-self:flex-end;flex-direction:row-reverse}
.chat-bubble{padding:.75rem 1rem;border-radius:14px;font-size:.83rem;line-height:1.6}
.chat-msg.user .chat-bubble{background:var(--accent);color:var(--black);font-weight:500;border-radius:14px 14px 4px 14px}
.chat-msg.ai .chat-bubble{background:var(--card2);border:1px solid var(--border);border-radius:14px 14px 14px 4px}
.chat-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;margin-top:.2rem}
.chat-input-wrap{padding:.875rem 1rem;border-top:1px solid var(--border);display:flex;gap:.625rem;background:var(--black)}
.chat-inp{flex:1;padding:.75rem 1rem;background:var(--card2);border:1.5px solid var(--border2);border-radius:var(--r);font-size:.85rem;color:var(--white);font-family:var(--body);outline:none}
.chat-inp:focus{border-color:var(--accent)}
.btn-send{width:40px;height:40px;border-radius:50%;background:var(--accent);color:var(--black);border:none;cursor:pointer;font-size:.9rem;flex-shrink:0}
.btn-send:disabled{opacity:.4;cursor:not-allowed}
.typing{display:flex;gap:4px;align-items:center;padding:.5rem}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:bounce .8s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

/* CATEGORIAS */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.625rem;margin-bottom:1.25rem}
.cat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:.875rem;text-align:center}
.cat-name{font-size:.72rem;font-weight:600;color:var(--muted);margin-bottom:.375rem}
.cat-val{font-family:var(--font);font-size:1rem;font-weight:900;letter-spacing:-.03em}

/* TOAST */
.toast{position:fixed;top:1rem;right:1rem;z-index:9999;background:var(--card2);border:1px solid var(--border2);padding:.75rem 1.25rem;border-radius:12px;font-size:.8rem;font-weight:600;display:none;max-width:280px}
.toast.show{display:block;animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}

/* ALERTA IA */
.alerta-ia{background:rgba(0,255,136,.06);border:1px solid rgba(0,255,136,.15);border-radius:12px;padding:1rem;margin-bottom:1rem}
.alerta-ia-title{font-size:.78rem;font-weight:700;color:var(--accent);margin-bottom:.5rem;display:flex;align-items:center;gap:.375rem}
.alerta-ia-text{font-size:.78rem;color:var(--muted);line-height:1.6}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo"><span class="j">J</span>gerenteAI · Financeiro</div>
    <div class="fg"><label class="lbl">Email</label><input class="inp" id="l-email" type="email" placeholder="seu@email.com"></div>
    <div class="fg"><label class="lbl">Senha</label><input class="inp" id="l-pwd" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn-login" id="l-btn" onclick="doLogin()">Entrar →</button>
    <div class="login-err" id="l-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="app-header">
    <div class="header-left">
      <div>
        <div class="header-logo"><span class="j">J</span>gerenteAI</div>
        <div class="header-company" id="h-company">Carregando...</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:.625rem"><a href="jgerente-app.html" class="btn-back">← Painel</a><button onclick="doLogout()" style="background:none;border:1px solid var(--border2);color:var(--muted);font-family:var(--body);font-size:.72rem;padding:.4rem .75rem;border-radius:8px;cursor:pointer">Sair</button></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('dashboard')">📊 Dashboard</button>
    <button class="tab-btn" onclick="showTab('lancamento')">+ Lançamento</button>
    <button class="tab-btn" onclick="showTab('contas')">📅 Contas</button>
    <button class="tab-btn" onclick="showTab('dre')">📈 DRE</button>
    <button class="tab-btn" onclick="showTab('historico')">📋 Histórico</button>
    <button class="tab-btn" onclick="showTab('chat')">🤖 IA</button>
  </div>

  <div class="content" id="content">
    <div style="text-align:center;padding:3rem;color:var(--muted)">Carregando...</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const { createClient } = supabase;
const sb = createClient(
  'https://hnculphposmgfvaeliiw.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhuY3VscGhwb3NtZ2Z2YWVsaWl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MTE4MDIsImV4cCI6MjA5MDM4NzgwMn0.mlkDEf0HI6XQm2mX7Ee3CWcR8WxevJiy3l2xBdvTaNM'
);
const API_URL = 'https://jgerente-ai.vercel.app/api/chat';

let S = { usuario: null, company: null, lancamentos: [], contas: [], chatMsgs: [], periodo: '7d', tipoLanc: 'entrada', metaReceita: 0, metaDespesa: 0 };
let chartBar = null, chartPizza = null;

// ── HELPERS ──
function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtMoeda(v){ return 'R$ '+Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtData(iso){ return new Date(iso).toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}); }
let toastTimer;
function toast(msg, green=true){ toastF(msg,green); }
function _toast(msg, green=true){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.style.color=green?'var(--accent)':'var(--error)';
  el.style.borderColor=green?'rgba(0,255,136,.2)':'rgba(255,61,107,.2)';
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),3000);
}

// ── CATEGORIAS ──
const CATS_SAIDA = ['Ingredientes','Bebidas','Embalagens','Funcionários','Aluguel','Energia','Gás','Limpeza','Manutenção','Marketing','Outros'];
const CATS_ENTRADA = ['Vendas','Delivery','PIX','Cartão','Dinheiro','Outros'];

// ── LOGIN ──
async function doLogin(){
  const email=document.getElementById('l-email').value.trim();
  const pwd=document.getElementById('l-pwd').value;
  const btn=document.getElementById('l-btn');
  const err=document.getElementById('l-err');
  if(!email||!pwd){ err.textContent='⚠️ Preencha email e senha'; return; }
  btn.disabled=true; btn.textContent='Entrando...';
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pwd });
  if(error){ err.textContent='❌ Email ou senha incorretos'; btn.disabled=false; btn.textContent='Entrar →'; return; }
  await initApp(data.user);
}

async function initApp(user){
  try{
    const { data: usr } = await sb.from('usuarios').select('*').eq('auth_id', user.id).single();
    if(!usr){ document.getElementById('l-err').textContent='⚠️ Usuário não encontrado'; return; }
    S.usuario = usr;
    const { data: comp } = await sb.from('companies').select('*').eq('id', usr.company_id).single();
    S.company = comp;
    document.getElementById('h-company').textContent = comp?.nome||'';
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').classList.add('show');
    await loadLancamentos();
    showTab('dashboard');
  }catch(e){
    console.error(e);
    document.getElementById('l-btn').disabled=false;
    document.getElementById('l-btn').textContent='Entrar →';
    document.getElementById('l-err').textContent='⚠️ Erro. Tente novamente.';
  }
}

async function loadLancamentos(){
  const from = new Date(); from.setDate(from.getDate()-30);
  const [lancs, contas] = await Promise.all([
    sb.from('financeiro').select('*').eq('company_id',S.company.id).gte('created_at',from.toISOString()).order('created_at',{ascending:false}),
    sb.from('contas').select('*').eq('company_id',S.company.id).order('vencimento',{ascending:true})
  ]);
  S.lancamentos = lancs.data||[];
  S.contas = contas.data||[];
  
  // Verificar contas atrasadas
  const hoje = new Date().toISOString().split('T')[0];
  for(const c of S.contas){
    if(c.status==='pendente' && c.vencimento < hoje){
      await sb.from('contas').update({status:'atrasado'}).eq('id',c.id);
      c.status='atrasado';
    }
  }

  // Carregar metas do localStorage
  S.metaReceita = parseFloat(localStorage.getItem('meta_receita_'+S.company.id)||0);
  S.metaDespesa = parseFloat(localStorage.getItem('meta_despesa_'+S.company.id)||0);
}

// ── TABS ──
function showTab(tab){
  S.currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['dashboard','lancamento','contas','dre','historico','chat'][i]===tab));
  const el=document.getElementById('content');
  el.style.padding='1.25rem';
  if(tab==='dashboard') renderDashboard();
  else if(tab==='lancamento') renderLancamento();
  else if(tab==='contas') renderContas();
  else if(tab==='dre') renderDRE();
  else if(tab==='historico') renderHistorico();
  else renderChat();
}

// ── DASHBOARD ──
function getLancsPeriodo(){
  const dias = S.periodo==='7d'?7:S.periodo==='15d'?15:30;
  const from = new Date(); from.setDate(from.getDate()-dias);
  return S.lancamentos.filter(l=>new Date(l.created_at)>=from);
}

function renderDashboard(){
  const lancs = getLancsPeriodo();
  const entradas = lancs.filter(l=>l.tipo==='entrada').reduce((a,l)=>a+Number(l.valor),0);
  const saidas = lancs.filter(l=>l.tipo==='saida').reduce((a,l)=>a+Number(l.valor),0);
  const saldo = entradas - saidas;
  const margem = entradas>0 ? Math.round((saldo/entradas)*100) : 0;

  // Dados por dia para gráfico
  const dias = S.periodo==='7d'?7:S.periodo==='15d'?15:30;
  const labels=[],dataEnt=[],dataSai=[];
  for(let i=dias-1;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i); d.setHours(0,0,0,0);
    const next=new Date(d); next.setDate(next.getDate()+1);
    const dayLancs=lancs.filter(l=>{const ct=new Date(l.created_at);return ct>=d&&ct<next;});
    labels.push(d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}));
    dataEnt.push(dayLancs.filter(l=>l.tipo==='entrada').reduce((a,l)=>a+Number(l.valor),0));
    dataSai.push(dayLancs.filter(l=>l.tipo==='saida').reduce((a,l)=>a+Number(l.valor),0));
  }

  // Categorias de saída
  const catMap={};
  lancs.filter(l=>l.tipo==='saida').forEach(l=>{
    const cat=l.categoria||'Outros';
    catMap[cat]=(catMap[cat]||0)+Number(l.valor);
  });
  const cats=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);

  // Contas vencendo hoje e amanhã
  const hoje = new Date().toISOString().split('T')[0];
  const amanha = new Date(); amanha.setDate(amanha.getDate()+1);
  const amanhaStr = amanha.toISOString().split('T')[0];
  const contasHoje = S.contas.filter(c=>c.vencimento===hoje&&c.status==='pendente');
  const contasAmanha = S.contas.filter(c=>c.vencimento===amanhaStr&&c.status==='pendente');
  const contasAtrasadas = S.contas.filter(c=>c.status==='atrasado');
  const totalVencer = [...contasHoje,...contasAmanha].reduce((a,c)=>a+Number(c.valor),0);
  const totalAtrasado = contasAtrasadas.reduce((a,c)=>a+Number(c.valor),0);

  // Ticket médio
  const diasComVenda = new Set(lancs.filter(l=>l.tipo==='entrada').map(l=>l.created_at.split('T')[0])).size;
  const ticketMedio = diasComVenda > 0 ? entradas/diasComVenda : 0;

  // Alertas IA
  const alertas=[];
  if(contasAtrasadas.length>0) alertas.push({emoji:'🚨',txt:`${contasAtrasadas.length} conta(s) atrasada(s) totalizando ${fmtMoeda(totalAtrasado)}. Regularize para evitar juros!`});
  if(contasHoje.length>0) alertas.push({emoji:'⏰',txt:`${contasHoje.length} conta(s) vence(m) HOJE totalizando ${fmtMoeda(contasHoje.reduce((a,c)=>a+Number(c.valor),0))}. Não esqueça!`});
  if(contasAmanha.length>0) alertas.push({emoji:'📅',txt:`${contasAmanha.length} conta(s) vence(m) amanhã totalizando ${fmtMoeda(contasAmanha.reduce((a,c)=>a+Number(c.valor),0))}.`});
  if(saidas>entradas) alertas.push({emoji:'🚨',txt:`Suas saídas (${fmtMoeda(saidas)}) estão maiores que as entradas (${fmtMoeda(entradas)}). Risco de caixa negativo!`});
  if(margem<20&&margem>0) alertas.push({emoji:'⚠️',txt:`Sua margem está em ${margem}%. O ideal é acima de 30%. Revise seus custos.`});
  const maiorGasto=cats[0];
  if(maiorGasto) alertas.push({emoji:'💡',txt:`Seu maior gasto é ${maiorGasto[0]} (${fmtMoeda(maiorGasto[1])}). Analise se é possível reduzir.`});
  if(S.metaReceita>0){
    const pctMeta=Math.round((entradas/S.metaReceita)*100);
    if(pctMeta<50) alertas.push({emoji:'🎯',txt:`Você atingiu ${pctMeta}% da meta de receita (${fmtMoeda(S.metaReceita)}). Faltam ${fmtMoeda(S.metaReceita-entradas)}.`});
    else if(pctMeta>=100) alertas.push({emoji:'🏆',txt:`Parabéns! Você bateu a meta de receita de ${fmtMoeda(S.metaReceita)}!`});
  }

  const el=document.getElementById('content');

        <button class="tipo-btn entrada ${S.tipoLanc==='entrada'?'active':''}" onclick="setTipo('entrada')">📈 Entrada</button>

        <div class="sugestoes" id="sugestoes">
          ${(S.tipoLanc==='saida'?produtosSaida:produtosEntrada).map(p=>`<div class="sugestao-chip" onclick="usarSugestao('${escHtml(p)}')">${escHtml(p)}</div>`).join('')}
        </div>`:''}
      </div>

        </select>
      </div>

      </button>
    </div>

}

function setTipo(tipo){
  S.tipoLanc=tipo;
  renderLancamento();
}

function usarSugestao(texto){
  const inp=document.getElementById('l-desc');
  if(inp){ inp.value=texto; sugerirCategoria(texto); }
}

function sugerirCategoria(texto){
  const t=texto.toLowerCase();
  const catInp=document.getElementById('l-cat');
  if(!catInp) return;
  const mapa={
    'coco':'Ingredientes','açúcar':'Ingredientes','farinha':'Ingredientes','leite':'Ingredientes',
    'carne':'Ingredientes','frango':'Ingredientes','peixe':'Ingredientes','legume':'Ingredientes',
    'verdura':'Ingredientes','tempero':'Ingredientes','óleo':'Ingredientes','manteiga':'Ingredientes',
    'refrigerante':'Bebidas','suco':'Bebidas','água':'Bebidas','cerveja':'Bebidas',
    'caixa':'Embalagens','sacola':'Embalagens','pote':'Embalagens','embalagem':'Embalagens',
    'salário':'Funcionários','funcionário':'Funcionários','vale':'Funcionários',
    'aluguel':'Aluguel','luz':'Energia','energia':'Energia','gás':'Gás',
    'detergente':'Limpeza','sabão':'Limpeza','limpeza':'Limpeza',
    'venda':'Vendas','delivery':'Delivery','pix':'PIX','cartão':'Cartão','dinheiro':'Dinheiro'
  };
  for(const [key,cat] of Object.entries(mapa)){
    if(t.includes(key)){
      catInp.value=cat;
      return;
    }
  }
}

async function lancar(){
  const valor=parseFloat(document.getElementById('l-valor')?.value);
  const desc=document.getElementById('l-desc')?.value.trim();
  const catManual=document.getElementById('l-cat')?.value;
  if(!valor||valor<=0){ toast('⚠️ Informe o valor',false); return; }
  if(!desc){ toast('⚠️ Informe a descrição',false); return; }

  const btn=document.getElementById('btn-lancar');
  btn.disabled=true; btn.textContent='Registrando...';

  // Detectar categoria se não selecionada
  let cat=catManual;
  if(!cat){
    sugerirCategoria(desc);
    cat=document.getElementById('l-cat')?.value||'Outros';
  }

  // Extrair produto da descrição
  const produto=desc.replace(/r\$?\s*\d+[\d.,]*/gi,'').replace(/reais?/gi,'').trim()||desc;

  const { data, error } = await sb.from('financeiro').insert({
    company_id: S.company.id,
    tipo: S.tipoLanc,
    valor,
    descricao: desc,
    categoria: cat||'Outros',
    produto: produto.slice(0,80)
  }).select().single();

  if(error){ toast('⚠️ Erro ao registrar',false); btn.disabled=false; btn.textContent=S.tipoLanc==='entrada'?'📈 Registrar Entrada':'📉 Registrar Saída'; return; }

  S.lancamentos.unshift(data);
  toast(`✅ ${S.tipoLanc==='entrada'?'Entrada':'Saída'} de ${fmtMoeda(valor)} registrada!`);
  renderLancamento();
}

              <button onclick="enviarMsg('Onde estou perdendo mais dinheiro?')" style="background:var(--card2);border:1px solid var(--border2);color:var(--muted);font-family:var(--body);font-size:.75rem;padding:.5rem 1rem;border-radius:8px;cursor:pointer">📊 Onde estou perdendo mais dinheiro?</button>

              <button onclick="enviarMsg('Qual foi meu melhor dia de vendas?')" style="background:var(--card2);border:1px solid var(--border2);color:var(--muted);font-family:var(--body);font-size:.75rem;padding:.5rem 1rem;border-radius:8px;cursor:pointer">📈 Qual foi meu melhor dia de vendas?</button>
            </div>
          </div>`

      <div class="chat-input-wrap">

function chatBubble(m){
  const isUser=m.role==='user';
  return`<div class="chat-msg ${isUser?'user':'ai'}">
    <div class="chat-av">${isUser?'👤':'💰'}</div>
    <div class="chat-bubble">${m.content.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<b>$1</b>')}</div>
  </div>`;
}

async function enviarMsg(txt){
  const inp=document.getElementById('chat-inp');
  const msg=txt||inp?.value.trim();
  if(!msg) return;
  if(inp) inp.value='';
  document.getElementById('btn-send').disabled=true;

  S.chatMsgs.push({role:'user',content:msg});

  // Preparar contexto financeiro
  const lancs30=S.lancamentos;
  const entradas=lancs30.filter(l=>l.tipo==='entrada').reduce((a,l)=>a+Number(l.valor),0);
  const saidas=lancs30.filter(l=>l.tipo==='saida').reduce((a,l)=>a+Number(l.valor),0);
  const catMap={};
  lancs30.filter(l=>l.tipo==='saida').forEach(l=>{ catMap[l.categoria||'Outros']=(catMap[l.categoria||'Outros']||0)+Number(l.valor); });
  const topCats=Object.entries(catMap).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([c,v])=>`${c}: R$${v.toFixed(2)}`).join(', ');

  const systemPrompt=`Você é o Agente Financeiro da empresa "${S.company?.nome}". Você é um especialista em gestão financeira para pequenas empresas brasileiras.

DADOS REAIS DOS ÚLTIMOS 30 DIAS:
- Total de entradas: R$${entradas.toFixed(2)}
- Total de saídas: R$${saidas.toFixed(2)}
- Saldo: R$${(entradas-saidas).toFixed(2)}
- Margem: ${entradas>0?Math.round(((entradas-saidas)/entradas)*100):0}%
- Principais gastos: ${topCats||'Nenhum registrado ainda'}
- Total de lançamentos: ${lancs30.length}

Sua função: identificar vazamentos financeiros, sugerir cortes de custos, analisar tendências e dar conselhos práticos.
Responda sempre em português brasileiro, de forma direta, prática e com exemplos concretos.
Use emojis para destacar pontos importantes. Seja como um contador experiente conversando com o dono.`;

  // Show typing
  const msgsEl=document.getElementById('chat-msgs');
  if(msgsEl){
    msgsEl.innerHTML=S.chatMsgs.map(m=>chatBubble(m)).join('')+
      '<div class="chat-msg ai"><div class="chat-av">💰</div><div class="chat-bubble"><div class="typing"><span></span><span></span><span></span></div></div></div>';
    msgsEl.scrollTop=msgsEl.scrollHeight;
  }

  try{
    const res=await fetch(API_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:S.chatMsgs,systemPrompt})
    });
    const data=await res.json();
    const reply=data.response||'Desculpe, não consegui processar.';
    S.chatMsgs.push({role:'assistant',content:reply});
  }catch(e){
    S.chatMsgs.push({role:'assistant',content:'Desculpe, ocorreu um erro. Tente novamente.'});
  }

  document.getElementById('btn-send').disabled=false;
  renderChat();
}

function contaRow(c){
  const hoje = new Date().toISOString().split('T')[0];
  const atrasada = c.status==='atrasado';
  const paga = c.status==='pago'||c.status==='recebido';
  const diasVenc = Math.ceil((new Date(c.vencimento)-new Date(hoje))/86400000);
  const corVal = c.tipo==='receber'?'var(--accent)':'var(--error)';

  return`<div style="display:flex;align-items:center;gap:.75rem;padding:.75rem 0;border-bottom:1px solid var(--border)">
    <div style="width:32px;height:32px;border-radius:8px;background:${paga?'rgba(255,255,255,.04)':c.tipo==='receber'?'rgba(0,255,136,.08)':'rgba(255,61,107,.08)'};display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0">
      ${paga?'✅':c.tipo==='receber'?'📥':'📤'}
    </div>
    <div style="flex:1;min-width:0">
      <div style="font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escHtml(c.descricao)}</div>
      <div style="font-size:.7rem;color:${atrasada?'var(--error)':'var(--muted)'}">
        ${atrasada?'⚠️ Atrasada':paga?'✅ Liquidada':'📅'} ${new Date(c.vencimento+'T12:00:00').toLocaleDateString('pt-BR')}
        ${!paga&&!atrasada&&diasVenc<=3?` · Vence em ${diasVenc} dia${diasVenc!==1?'s':''}`:'' }
      </div>
    </div>
    <div style="font-family:var(--font);font-size:.9rem;font-weight:800;color:${paga?'var(--muted)':corVal};flex-shrink:0;text-align:right">${c.valor_pago>0&&!paga?`<div style='font-size:.65rem;color:var(--muted);font-family:var(--body)'>Pago: ${fmtMoeda(c.valor_pago)}</div><div style='color:var(--warning)'>${fmtMoeda(c.valor-(c.valor_pago||0))}</div><div style='font-size:.6rem;color:var(--muted);font-family:var(--body)'>de ${fmtMoeda(c.valor)}</div>`:fmtMoeda(c.valor)}</div>
    ${!paga?`<div style="display:flex;gap:.375rem;flex-shrink:0"><button onclick="liquidarConta('${c.id}','${c.tipo}')" style="background:${c.tipo==='receber'?'rgba(0,255,136,.08)':'rgba(255,61,107,.08)'};border:1px solid ${c.tipo==='receber'?'rgba(0,255,136,.2)':'rgba(255,61,107,.2)'};color:${corVal};font-size:.65rem;font-weight:700;padding:.3rem .5rem;border-radius:6px;cursor:pointer;font-family:var(--body)">${c.tipo==='receber'?'Receber':'Pagar'}</button><button onclick="pagarParcial('${c.id}')" style="background:rgba(255,214,0,.08);border:1px solid rgba(255,214,0,.2);color:var(--warning);font-size:.65rem;font-weight:700;padding:.3rem .5rem;border-radius:6px;cursor:pointer;font-family:var(--body)">Parcial</button></div>`:``}
  </div>`;
}

function addConta(tipo){
  const modal=`
    <div class="modal-title">${tipo==='pagar'?'📤 Nova Conta a Pagar':'📥 Nova Conta a Receber'}</div>
    <div class="fg"><label class="lbl">Descrição *</label><input class="inp" id="c-desc" placeholder="${tipo==='pagar'?'Ex: Fornecedor de coco ralado':'Ex: Pagamento cliente João'}"></div>
    <div class="fg"><label class="lbl">Valor *</label><input class="inp" id="c-valor" type="number" step="0.01" placeholder="0,00"></div>
    <div class="fg"><label class="lbl">Vencimento *</label><input class="inp" id="c-venc" type="date"></div>
    <button class="btn-lancar" onclick="salvarConta('${tipo}')">💾 Salvar</button>
    <button style="width:100%;padding:.75rem;background:none;border:1px solid var(--border2);color:var(--muted);border-radius:var(--r);font-family:var(--font);font-size:.78rem;font-weight:700;cursor:pointer;margin-top:.5rem" onclick="closeModal()">Cancelar</button>
  `;
  openModal(modal);
}

function openModal(html){
  let overlay=document.getElementById('f-overlay');
  if(!overlay){
    overlay=document.createElement('div');
    overlay.id='f-overlay';
    overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(8px)';
    overlay.onclick=e=>{if(e.target===overlay)closeModal()};
    document.body.appendChild(overlay);
  }
  overlay.innerHTML=`<div style="background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:500px;padding:1.5rem;animation:slideUp .25s ease"><div style="width:36px;height:3px;background:var(--border2);border-radius:100px;margin:-.5rem auto 1.25rem"></div>${html}</div>`;
  overlay.style.display='flex';
}
function closeModal(){ const o=document.getElementById('f-overlay'); if(o) o.style.display='none'; }

async function salvarConta(tipo){
  const desc=document.getElementById('c-desc')?.value.trim();
  const valor=parseFloat(document.getElementById('c-valor')?.value);
  const venc=document.getElementById('c-venc')?.value;
  if(!desc||!valor||!venc){ toastF('⚠️ Preencha todos os campos',false); return; }
  const { data, error } = await sb.from('contas').insert({
    company_id:S.company.id, tipo, descricao:desc, valor, vencimento:venc, status:'pendente'
  }).select().single();
  if(error){ toastF('⚠️ Erro ao salvar',false); return; }
  S.contas.push(data);
  closeModal();
  toastF(`✅ Conta ${tipo==='pagar'?'a pagar':'a receber'} cadastrada!`);
  renderContas();
}

function pagarParcial(id){
  const c = S.contas.find(x=>x.id===id);
  if(!c) return;
  const valorRestante = (c.valor - (c.valor_pago||0)).toFixed(2);
  const pct = c.valor_pago>0 ? Math.round(((c.valor_pago||0)/c.valor)*100) : 0;

  const modal = '<div class="modal-title">'+(c.tipo==='receber'?'📥':'📤')+' Pagamento Parcial</div>'
    +'<div style="background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:1rem;margin-bottom:1.25rem">'
    +'<div style="font-size:.82rem;font-weight:600;margin-bottom:.875rem">'+escHtml(c.descricao)+'</div>'
    +'<div style="display:flex;justify-content:space-between;font-size:.78rem;margin-bottom:.375rem"><span style="color:var(--muted)">Valor total</span><span>'+fmtMoeda(c.valor)+'</span></div>'
    +'<div style="display:flex;justify-content:space-between;font-size:.78rem;margin-bottom:.375rem"><span style="color:var(--muted)">Já pago</span><span style="color:var(--accent)">'+fmtMoeda(c.valor_pago||0)+'</span></div>'
    +(c.valor_pago>0?'<div style="height:4px;background:var(--border);border-radius:100px;margin:.5rem 0;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:var(--accent);border-radius:100px"></div></div>':'')
    +'<div style="display:flex;justify-content:space-between;font-size:.88rem;font-weight:700;margin-top:.25rem"><span style="color:var(--muted)">Restante</span><span style="color:var(--warning)">'+fmtMoeda(parseFloat(valorRestante))+'</span></div>'
    +'</div>'
    +'<div class="fg"><label class="lbl">Quanto vai pagar agora? *</label>'
    +'<input class="inp" id="parcial-valor" type="number" step="0.01" min="0.01" max="'+valorRestante+'" placeholder="0,00" value="'+valorRestante+'" style="font-size:1.1rem;font-family:var(--font);font-weight:700"></div>'
    +'<div style="display:flex;gap:.5rem;margin-top:.5rem">'
    +'<button data-id="'+id+'" onclick="confirmarParcial(this.dataset.id)" style="flex:1;padding:.875rem;background:var(--accent);color:var(--black);border:none;border-radius:var(--r);font-family:var(--font);font-size:.82rem;font-weight:700;cursor:pointer">✅ Confirmar pagamento</button>'
    +'<button onclick="closeModal()" style="flex:1;padding:.875rem;background:none;border:1px solid var(--border2);color:var(--muted);border-radius:var(--r);font-family:var(--font);font-size:.78rem;font-weight:700;cursor:pointer">Cancelar</button>'
    +'</div>';

  openModal(modal);
  setTimeout(function(){ var el=document.getElementById('parcial-valor'); if(el){el.focus();el.select();} }, 100);
}

async function reverterConta(id){
  const c = S.contas.find(x=>x.id===id);
  if(!c) return;

  const modal = '<div class="modal-title">↩ Reverter Pagamento</div>'
    +'<div style="background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:1rem;margin-bottom:1.25rem">'
    +'<div style="font-size:.82rem;font-weight:600;margin-bottom:.375rem">'+escHtml(c.descricao)+'</div>'
    +'<div style="font-size:.78rem;color:var(--muted)">Esta conta foi marcada como '+(c.status==='pago'?'paga':'recebida')+'. Deseja reverter para pendente?</div>'
    +'<div style="margin-top:.75rem;font-size:.78rem;color:var(--warning)">⚠️ O lançamento no financeiro NÃO será removido automaticamente.</div>'
    +'</div>'
    +'<div style="display:flex;gap:.5rem">'
    +'<button data-id="'+id+'" onclick="confirmarReverter(this.dataset.id)" style="flex:1;padding:.875rem;background:rgba(255,214,0,.1);border:1px solid rgba(255,214,0,.2);color:var(--warning);border-radius:var(--r);font-family:var(--font);font-size:.82rem;font-weight:700;cursor:pointer">↩ Sim, reverter</button>'
    +'<button onclick="closeModal()" style="flex:1;padding:.875rem;background:none;border:1px solid var(--border2);color:var(--muted);border-radius:var(--r);font-family:var(--font);font-size:.78rem;font-weight:700;cursor:pointer">Cancelar</button>'
    +'</div>';
  openModal(modal);
}

async function confirmarReverter(id){
  const c = S.contas.find(x=>x.id===id);
  if(!c) return;
  await sb.from('contas').update({ status:'pendente', valor_pago:0 }).eq('id', id);
  c.status = 'pendente';
  c.valor_pago = 0;
  closeModal();
  toastF('↩ Conta revertida para pendente!');
  renderContas();
}

async function confirmarParcial(id){
  const c = S.contas.find(x=>x.id===id);
  if(!c) return;
  const inp = document.getElementById('parcial-valor');
  if(!inp) return;
  const valorPagamento = parseFloat(inp.value);
  const valorRestante = c.valor - (c.valor_pago||0);

  if(isNaN(valorPagamento)||valorPagamento<=0){ toastF('⚠️ Informe um valor válido', false); return; }
  if(valorPagamento > valorRestante+0.01){ toastF('⚠️ Valor maior que o restante', false); return; }

  const novoValorPago = (c.valor_pago||0) + valorPagamento;
  const quitado = novoValorPago >= c.valor - 0.01;
  const novoStatus = quitado ? (c.tipo==='receber'?'recebido':'pago') : c.status;

  await sb.from('contas').update({ valor_pago: novoValorPago, status: novoStatus }).eq('id', id);

  await sb.from('financeiro').insert({
    company_id: S.company.id,
    tipo: c.tipo==='receber'?'entrada':'saida',
    valor: valorPagamento,
    descricao: c.descricao + (quitado ? ' (quitado)' : ' (parcial)'),
    categoria: c.tipo==='receber'?'Recebimentos':'Pagamentos',
    produto: c.descricao
  });

  c.valor_pago = novoValorPago;
  c.status = novoStatus;
  S.lancamentos.unshift({...c, tipo:c.tipo==='receber'?'entrada':'saida', valor:valorPagamento, created_at:new Date().toISOString()});

  closeModal();

  if(quitado){
    toastF('✅ Conta quitada!');
  } else {
    toastF('✅ '+fmtMoeda(valorPagamento)+' registrado! Resta '+fmtMoeda(c.valor-novoValorPago));
  }

  // Recarrega contas do banco para garantir dados atualizados
  const { data: contasAtualizadas } = await sb.from('contas').select('*').eq('company_id', S.company.id).order('vencimento', {ascending:true});
  if(contasAtualizadas) S.contas = contasAtualizadas;
  renderContas();
}

async function liquidarConta(id, tipo){
  const status=tipo==='receber'?'recebido':'pago';
  await sb.from('contas').update({status}).eq('id',id);
  const c=S.contas.find(x=>x.id===id);
  if(c){
    c.status=status;
    // Registrar no financeiro automaticamente
    await sb.from('financeiro').insert({
      company_id:S.company.id,
      tipo:tipo==='receber'?'entrada':'saida',
      valor:c.valor,
      descricao:c.descricao,
      categoria:tipo==='receber'?'Recebimentos':'Pagamentos',
      produto:c.descricao
    });
    S.lancamentos.unshift({...c,tipo:tipo==='receber'?'entrada':'saida',created_at:new Date().toISOString()});
  }
  toastF(`✅ ${tipo==='receber'?'Recebimento':'Pagamento'} registrado!`);
  renderContas();
}

function toastF(msg, green=true){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.style.color=green?'var(--accent)':'var(--error)';
  el.style.borderColor=green?'rgba(0,255,136,.2)':'rgba(255,61,107,.2)';
  el.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer=setTimeout(()=>el.classList.remove('show'),3000);
}

// ── DRE ──────────────────────────────────────────────
function renderDRE(){
  const agora = new Date();
  const mesAtual = agora.getMonth();
  const anoAtual = agora.getFullYear();

  // Últimos 3 meses
  const meses = [];
  for(let i=2;i>=0;i--){
    const d = new Date(anoAtual, mesAtual-i, 1);
    const fim = new Date(anoAtual, mesAtual-i+1, 0, 23, 59, 59);
    const lancs = S.lancamentos.filter(l=>{
      const ct=new Date(l.created_at);
      return ct>=d&&ct<=fim;
    });
    const entrada = lancs.filter(l=>l.tipo==='entrada').reduce((a,l)=>a+Number(l.valor),0);
    const saida = lancs.filter(l=>l.tipo==='saida').reduce((a,l)=>a+Number(l.valor),0);
    const lucro = entrada-saida;
    const margem = entrada>0?Math.round((lucro/entrada)*100):0;

    // Categorias
    const cats={};
    lancs.filter(l=>l.tipo==='saida').forEach(l=>{ cats[l.categoria||'Outros']=(cats[l.categoria||'Outros']||0)+Number(l.valor); });

    meses.push({
      label: d.toLocaleDateString('pt-BR',{month:'long',year:'numeric'}),
      entrada, saida, lucro, margem, cats
    });
  }

  const el=document.getElementById('content');
  const mesAtualData = meses[2];

  el.innerHTML=`
    <div style="font-size:.78rem;font-weight:700;margin-bottom:1rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">DRE — Demonstrativo de Resultado</div>

    <!-- Mês atual resumo -->
    <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.25rem;margin-bottom:1rem">
      <div style="font-size:.75rem;font-weight:700;color:var(--muted);margin-bottom:1rem;text-transform:uppercase;letter-spacing:.06em">${mesAtualData.label}</div>
      ${dreRow('(+) Receita Bruta', mesAtualData.entrada, 'var(--accent)')}
      ${dreRow('(-) Total de Custos', mesAtualData.saida, 'var(--error)')}
      <div style="height:1px;background:var(--border);margin:.75rem 0"></div>
      ${dreRow('(=) Lucro Bruto', mesAtualData.lucro, mesAtualData.lucro>=0?'var(--accent)':'var(--error)', true)}
      <div style="margin-top:.875rem;padding:.75rem;background:${mesAtualData.margem>=30?'rgba(0,255,136,.06)':mesAtualData.margem>=20?'rgba(255,214,0,.06)':'rgba(255,61,107,.06)'};border-radius:8px;text-align:center">
        <span style="font-family:var(--font);font-size:1.5rem;font-weight:900;color:${mesAtualData.margem>=30?'var(--accent)':mesAtualData.margem>=20?'var(--warning)':'var(--error)'}">${mesAtualData.margem}%</span>
        <span style="font-size:.72rem;color:var(--muted);margin-left:.5rem">de margem</span>
      </div>
    </div>

    <!-- Breakdown de custos -->
    ${Object.keys(mesAtualData.cats).length>0?`
    <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.25rem;margin-bottom:1rem">
      <div style="font-size:.75rem;font-weight:700;color:var(--muted);margin-bottom:.875rem;text-transform:uppercase;letter-spacing:.06em">Custos por categoria</div>
      ${Object.entries(mesAtualData.cats).sort((a,b)=>b[1]-a[1]).map(([cat,val])=>`
        <div style="display:flex;align-items:center;gap:.75rem;padding:.5rem 0;border-bottom:1px solid var(--border)">
          <div style="flex:1;font-size:.8rem">${cat}</div>
          <div style="font-size:.8rem;font-weight:700;color:var(--error)">${fmtMoeda(val)}</div>
          <div style="font-size:.7rem;color:var(--muted);width:35px;text-align:right">${Math.round((val/mesAtualData.saida)*100)}%</div>
        </div>`).join('')}
    </div>`:''}

    <!-- Comparativo 3 meses -->
    <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.25rem">
      <div style="font-size:.75rem;font-weight:700;color:var(--muted);margin-bottom:.875rem;text-transform:uppercase;letter-spacing:.06em">Comparativo — Últimos 3 meses</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem">
        ${meses.map(m=>`
          <div style="background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:.75rem;text-align:center">
            <div style="font-size:.62rem;color:var(--muted);margin-bottom:.375rem">${m.label.split(' ')[0]}</div>
            <div style="font-size:.75rem;font-weight:700;color:${m.lucro>=0?'var(--accent)':'var(--error)'}">${fmtMoeda(m.lucro)}</div>
            <div style="font-size:.62rem;color:var(--muted);margin-top:.2rem">${m.margem}% margem</div>
          </div>`).join('')}
      </div>
    </div>

    <!-- Metas -->
    <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.25rem;margin-top:1rem">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.875rem">
        <div style="font-size:.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">Metas do mês</div>
        <button onclick="editarMetas()" style="background:var(--card2);border:1px solid var(--border2);color:var(--muted);font-size:.7rem;padding:.3rem .625rem;border-radius:6px;cursor:pointer;font-family:var(--body)">✏️ Editar</button>
      </div>
      ${S.metaReceita>0?`
        <div style="margin-bottom:.75rem">
          <div style="display:flex;justify-content:space-between;font-size:.75rem;margin-bottom:.375rem"><span>Meta de Receita</span><span style="color:var(--accent)">${fmtMoeda(mesAtualData.entrada)} / ${fmtMoeda(S.metaReceita)}</span></div>
          <div style="height:6px;background:var(--border);border-radius:100px;overflow:hidden"><div style="height:100%;width:${Math.min(100,Math.round((mesAtualData.entrada/S.metaReceita)*100))}%;background:var(--accent);border-radius:100px"></div></div>
        </div>`:'<div style="font-size:.78rem;color:var(--muted);text-align:center;padding:.5rem">Nenhuma meta definida. <button onclick="editarMetas()" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:.78rem">Definir agora →</button></div>'}
      ${S.metaDespesa>0?`
        <div>
          <div style="display:flex;justify-content:space-between;font-size:.75rem;margin-bottom:.375rem"><span>Limite de Despesas</span><span style="color:var(--error)">${fmtMoeda(mesAtualData.saida)} / ${fmtMoeda(S.metaDespesa)}</span></div>
          <div style="height:6px;background:var(--border);border-radius:100px;overflow:hidden"><div style="height:100%;width:${Math.min(100,Math.round((mesAtualData.saida/S.metaDespesa)*100))}%;background:var(--error);border-radius:100px"></div></div>
        </div>`:''}
    </div>
  `;
}

function dreRow(label, val, cor, bold=false){
  return`<div style="display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;border-bottom:1px solid var(--border)">
    <div style="font-size:${bold?'.82':'0.78'}rem;font-weight:${bold?700:400};color:${bold?'var(--white)':'var(--muted)'}">${label}</div>
    <div style="font-family:var(--font);font-size:${bold?'.9':'0.82'}rem;font-weight:${bold?900:600};color:${cor}">${fmtMoeda(val)}</div>
  </div>`;
}

// ── METAS ──
function editarMetas(){
  openModal(`
    <div style="font-family:var(--font);font-size:1rem;font-weight:900;letter-spacing:-.03em;margin-bottom:1.25rem">🎯 Metas do mês</div>
    <div class="fg"><label class="lbl">Meta de Receita (R$)</label>
      <input class="inp" id="meta-receita" type="number" step="0.01" value="${S.metaReceita||''}" placeholder="Ex: 10000">
    </div>
    <div class="fg"><label class="lbl">Limite de Despesas (R$)</label>
      <input class="inp" id="meta-despesa" type="number" step="0.01" value="${S.metaDespesa||''}" placeholder="Ex: 6000">
    </div>
    <button class="btn-lancar" onclick="salvarMetas()">💾 Salvar metas</button>
    <button style="width:100%;padding:.75rem;background:none;border:1px solid var(--border2);color:var(--muted);border-radius:var(--r);font-family:var(--font);font-size:.78rem;font-weight:700;cursor:pointer;margin-top:.5rem" onclick="closeModal()">Cancelar</button>
  `);
}

function salvarMetas(){
  const r=parseFloat(document.getElementById('meta-receita')?.value)||0;
  const d=parseFloat(document.getElementById('meta-despesa')?.value)||0;
  S.metaReceita=r; S.metaDespesa=d;
  localStorage.setItem('meta_receita_'+S.company.id, r);
  localStorage.setItem('meta_despesa_'+S.company.id, d);
  closeModal();
  toastF('✅ Metas salvas!');
  renderDashboard();
}

async function doLogout(){
  await sb.auth.signOut();
  window.location.href = 'jgerente-app.html';
}

// ── BOOT ──
(async()=>{
  const { data } = await sb.auth.getSession();
  if(data?.session?.user) await initApp(data.session.user);
})();
</script>
